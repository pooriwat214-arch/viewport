<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync AI - Next Gen QC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-light: #eef2ff;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body { 
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b;
            background-image: radial-gradient(circle at 0% 0%, #e0e7ff 0%, transparent 25%), 
                              radial-gradient(circle at 100% 100%, #fef3c7 0%, transparent 25%);
            background-attachment: fixed;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .card-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04), 0 4px 12px -3px rgba(0, 0, 0, 0.02);
        }

        .order-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.12);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-ai { animation: pulse-soft 3s infinite ease-in-out; }
        
        .camera-overlay {
            position: relative;
            overflow: hidden;
            background: #000;
        }
        
        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy, getDocs, deleteDoc, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy, getDocs, deleteDoc, writeBatch, updateDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const apiKey = ""; 
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [qcModal, setQcModal] = useState(null);
            const [activeTab, setActiveTab] = useState('all'); 
            const [showInsights, setShowInsights] = useState(false);
            const [insightContent, setInsightContent] = useState('');
            const [isGeneratingInsight, setIsGeneratingInsight] = useState(false);
            const [form, setForm] = useState({ title: '', detail: '', tempImages: [], aiAnalysis: '' });
            
            // Camera states
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const streamRef = useRef(null);

            const dbRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-ai-v2-premium';

            useEffect(() => {
                const init = async () => {
                    if (!window.FB) return;
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FB;
                    const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"AIzaSyDfnz6oOdNuWflcjgr_5cBkrQOCIXcwfHw","authDomain":"myworklog-fd954.firebaseapp.com","projectId":"myworklog-fd954"}');
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    dbRef.current = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                    onAuthStateChanged(auth, u => { if(u) setUser(u); });
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, query, onSnapshot, orderBy, getDocs } = window.FB;
                const ordersRef = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders');
                const q = query(ordersRef, orderBy('timestamp', 'desc'));

                return onSnapshot(q, async (snapshot) => {
                    const orderData = await Promise.all(snapshot.docs.map(async (orderDoc) => {
                        const id = orderDoc.id;
                        const data = orderDoc.data();
                        const imgsSnap = await getDocs(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id, 'images'));
                        const images = imgsSnap.docs.map(d => d.data().src);
                        return { id, ...data, images };
                    }));
                    setOrders(orderData);
                });
            }, [user]);

            // Gemini API Implementation
            const callGemini = async (prompt, imageData = null, retries = 5) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                let parts = [{ text: prompt }];
                if (imageData) parts.push({ inlineData: { mimeType: "image/png", data: imageData.split(',')[1] } });
                const contents = [{ role: "user", parts }];

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents })
                        });
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "ประมวลผลไม่สำเร็จ";
                    } catch (error) {
                        if (i === retries - 1) throw error;
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    }
                }
            };

            // Gemini TTS Implementation
            const speakWithGemini = async (text) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `พูดด้วยเสียงนุ่มนวลและเป็นมืออาชีพ: ${text}` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                            }
                        })
                    });
                    const result = await response.json();
                    const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                    
                    // PCM to WAV conversion (simplified)
                    const audioBlob = new Blob([Uint8Array.from(atob(pcmData), c => c.charCodeAt(0))], { type: 'audio/l16' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                } catch (e) {
                    console.error("TTS failed", e);
                }
            };

            const generateInsights = async () => {
                setIsGeneratingInsight(true);
                setShowInsights(true);
                const orderSummary = orders.map(o => `งาน: ${o.title}, สถานะ: ${o.qcStatus}, หมายเหตุ: ${o.qcNote || 'ไม่มี'}`).join('\n');
                const prompt = `วิเคราะห์ข้อมูลงาน QC ต่อไปนี้และสรุปภาพรวมปัญหาที่พบบ่อย พร้อมคำแนะนำเพื่อปรับปรุงกระบวนการทำงานในอนาคต (สรุปเป็นข้อๆ กระชับ): \n${orderSummary}`;
                const res = await callGemini(prompt);
                setInsightContent(res);
                setIsGeneratingInsight(false);
            };

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    streamRef.current = stream;
                    if (videoRef.current) videoRef.current.srcObject = stream;
                    setIsCameraOpen(true);
                } catch (err) {
                    console.error("Camera access denied:", err);
                }
            };

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                }
                setIsCameraOpen(false);
            };

            const capturePhoto = () => {
                if (videoRef.current && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const video = videoRef.current;
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/png');
                    setForm(f => ({ ...f, tempImages: [...f.tempImages, dataUrl] }));
                    stopCamera();
                }
            };

            const filteredOrders = orders.filter(o => {
                if (activeTab === 'all') return true;
                return o.qcStatus === activeTab;
            });

            const stats = {
                total: orders.length,
                passed: orders.filter(o => o.qcStatus === 'passed').length,
                rejected: orders.filter(o => o.qcStatus === 'rejected').length,
                pending: orders.filter(o => o.qcStatus === 'pending' || !o.qcStatus).length,
            };

            const saveQC = async (status, rating, note) => {
                try {
                    const { doc, updateDoc } = window.FB;
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', qcModal.id), {
                        qcStatus: status,
                        qcRating: rating,
                        qcNote: note,
                    });
                    setQcModal(null);
                } catch (e) { console.error(e); }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [orders, isAdding, qcModal, activeTab, isCameraOpen, showInsights, isGeneratingInsight]);

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-20 lg:w-64 glass border-r border-slate-200 hidden md:flex flex-col p-4">
                        <div className="flex items-center gap-3 px-3 py-6 mb-8">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-indigo-200">
                                <i data-lucide="zap" className="w-6 h-6"></i>
                            </div>
                            <span className="font-extrabold text-xl hidden lg:block">WorkSync<span className="text-indigo-600">.AI</span></span>
                        </div>

                        <nav className="flex-1 space-y-2">
                            {[
                                { id: 'all', label: 'Dashboard', icon: 'layout-grid' },
                                { id: 'pending', label: 'ตรวจงาน', icon: 'clock' },
                                { id: 'passed', label: 'ผ่านแล้ว', icon: 'check-circle' },
                                { id: 'rejected', label: 'รอแก้ไข', icon: 'alert-circle' },
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`w-full flex items-center gap-3 p-3.5 rounded-2xl transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-500 hover:bg-slate-100'}`}
                                >
                                    <i data-lucide={tab.icon} className="w-5 h-5"></i>
                                    <span className="font-semibold text-sm hidden lg:block">{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto p-4 bg-indigo-50 rounded-3xl hidden lg:block">
                            <div className="flex items-center gap-2 mb-2">
                                <i data-lucide="sparkles" className="w-4 h-4 text-indigo-600 animate-ai"></i>
                                <span className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">AI Credits</span>
                            </div>
                            <div className="h-1.5 w-full bg-indigo-100 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-600 w-3/4"></div>
                            </div>
                            <p className="text-[10px] text-indigo-400 mt-2 font-medium">920 / 1000 requests left</p>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-4 lg:p-10">
                        <header className="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-10">
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">ระบบตรวจสอบคุณภาพอัจฉริยะ</h1>
                                <p className="text-slate-500 text-sm mt-1">ขับเคลื่อนด้วย Gemini 2.5 Flash เพื่อความแม่นยำสูงสุด</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <button 
                                    onClick={generateInsights}
                                    className="glass px-5 py-3 rounded-2xl text-slate-600 font-bold text-sm flex items-center gap-2 hover:bg-white transition-all card-shadow border-indigo-200"
                                >
                                    <i data-lucide="brain-circuit" className="w-4 h-4 text-indigo-600"></i>
                                    ✨ สรุปรายงานด้วย AI
                                </button>
                                <button 
                                    onClick={() => setIsAdding(true)}
                                    className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 hover:bg-indigo-600 transition-all shadow-xl shadow-slate-200"
                                >
                                    <i data-lucide="plus" className="w-4 h-4"></i>
                                    สร้างรายการใหม่
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                            {[
                                { label: 'งานทั้งหมด', val: stats.total, color: 'indigo', icon: 'box' },
                                { label: 'รอตรวจ', val: stats.pending, color: 'amber', icon: 'loader' },
                                { label: 'ผ่านเกณฑ์', val: stats.passed, color: 'emerald', icon: 'shield-check' },
                                { label: 'ต้องแก้ไข', val: stats.rejected, color: 'rose', icon: 'x-circle' },
                            ].map((s, idx) => (
                                <div key={idx} className="glass p-6 rounded-[2rem] card-shadow">
                                    <div className={`w-10 h-10 bg-${s.color}-100 text-${s.color}-600 rounded-xl flex items-center justify-center mb-4`}>
                                        <i data-lucide={s.icon} className="w-5 h-5"></i>
                                    </div>
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">{s.label}</p>
                                    <h2 className="text-2xl font-black mt-1">{s.val}</h2>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            {filteredOrders.length === 0 ? (
                                <div className="col-span-full py-20 text-center">
                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i data-lucide="package-search" className="w-8 h-8 text-slate-300"></i>
                                    </div>
                                    <p className="text-slate-400 font-medium italic">ไม่มีข้อมูลในหมวดหมู่นี้</p>
                                </div>
                            ) : filteredOrders.map(o => (
                                <div key={o.id} className="order-card glass rounded-[2.5rem] p-6 card-shadow flex flex-col group border-l-8 border-transparent hover:border-indigo-600">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="flex-1 overflow-hidden">
                                            <h3 className="font-bold text-lg text-slate-800 truncate leading-tight">{o.title}</h3>
                                            <div className="flex items-center gap-2 mt-1">
                                                <div className="flex gap-0.5">
                                                    {[1,2,3,4,5].map(s => (
                                                        <i key={s} data-lucide="star" className={`w-3 h-3 ${s <= (o.qcRating || 0) ? 'fill-amber-400 text-amber-400' : 'text-slate-200'}`}></i>
                                                    ))}
                                                </div>
                                                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter italic">ID: {o.id.slice(-6)}</span>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => setQcModal(o)}
                                            className="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all"
                                        >
                                            <i data-lucide="edit-3" className="w-4 h-4"></i>
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-3 gap-2 mb-6">
                                        {o.images?.slice(0, 3).map((img, i) => (
                                            <div key={i} className="aspect-[4/5] rounded-2xl overflow-hidden ring-4 ring-white shadow-sm hover:scale-105 transition-transform">
                                                <img src={img} className="w-full h-full object-cover" />
                                            </div>
                                        ))}
                                    </div>

                                    {o.aiAnalysis && (
                                        <div className="bg-indigo-50 p-4 rounded-3xl border border-indigo-100 mb-6 text-xs text-slate-600 leading-relaxed italic line-clamp-2">
                                            <span className="font-bold text-indigo-600 not-italic mr-1 block mb-1 flex items-center gap-1">
                                                <i data-lucide="sparkles" className="w-3 h-3"></i> AI Pre-Scan:
                                            </span>
                                            "{o.aiAnalysis}"
                                        </div>
                                    )}

                                    <div className="mt-auto flex items-center justify-between pt-4 border-t border-slate-100">
                                        <div className="flex items-center gap-2">
                                            <div className={`w-2 h-2 rounded-full ${o.qcStatus === 'passed' ? 'bg-emerald-500' : o.qcStatus === 'rejected' ? 'bg-rose-500' : 'bg-amber-500 shadow-sm'}`}></div>
                                            <span className={`text-[10px] font-black uppercase tracking-widest ${o.qcStatus === 'passed' ? 'text-emerald-600' : o.qcStatus === 'rejected' ? 'text-rose-600' : 'text-amber-600'}`}>
                                                {o.qcStatus === 'passed' ? 'Passed' : o.qcStatus === 'rejected' ? 'Needs Fix' : 'Reviewing'}
                                            </span>
                                        </div>
                                        <span className="text-[10px] font-bold text-slate-300">
                                            {o.timestamp ? new Date(o.timestamp.seconds * 1000).toLocaleDateString('th-TH') : ''}
                                        </span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* AI Insights Modal */}
                    {showInsights && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] p-10 card-shadow border border-white overflow-hidden flex flex-col max-h-[85vh]">
                                <div className="flex justify-between items-center mb-8">
                                    <div className="flex items-center gap-3">
                                        <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white">
                                            <i data-lucide="brain-circuit"></i>
                                        </div>
                                        <h2 className="text-2xl font-black italic uppercase">AI Executive Summary</h2>
                                    </div>
                                    <button onClick={() => setShowInsights(false)} className="w-12 h-12 flex items-center justify-center rounded-full hover:bg-slate-100"><i data-lucide="x"></i></button>
                                </div>

                                <div className="flex-1 overflow-y-auto custom-scrollbar pr-4">
                                    {isGeneratingInsight ? (
                                        <div className="space-y-4">
                                            <div className="h-4 w-3/4 loading-shimmer rounded"></div>
                                            <div className="h-4 w-full loading-shimmer rounded"></div>
                                            <div className="h-4 w-5/6 loading-shimmer rounded"></div>
                                            <div className="h-4 w-2/3 loading-shimmer rounded"></div>
                                        </div>
                                    ) : (
                                        <div className="prose prose-slate max-w-none">
                                            <div className="text-slate-600 leading-loose whitespace-pre-line text-sm bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                                                {insightContent}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="mt-8 pt-6 border-t border-slate-100 flex justify-end">
                                    <button onClick={() => setShowInsights(false)} className="px-8 py-4 bg-slate-900 text-white rounded-[2rem] font-bold">รับทราบ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Modal */}
                    {isAdding && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-300">
                            <div className="bg-white/90 backdrop-blur-xl w-full max-w-xl rounded-[3rem] p-10 card-shadow border border-white overflow-y-auto max-h-[90vh] custom-scrollbar">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black italic tracking-tighter">NEW QUALITY ENTRY.</h2>
                                    <button onClick={() => setIsAdding(false)} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100"><i data-lucide="x"></i></button>
                                </div>

                                <div className="space-y-6">
                                    <div className="flex gap-3 overflow-x-auto pb-4 custom-scrollbar items-end">
                                        <button 
                                            onClick={startCamera}
                                            className="w-24 h-24 flex-shrink-0 bg-indigo-600 text-white rounded-[2rem] flex flex-col items-center justify-center gap-2 hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100"
                                        >
                                            <i data-lucide="camera" className="w-6 h-6"></i>
                                            <span className="text-[10px] font-bold uppercase">Camera</span>
                                        </button>

                                        <label className="w-24 h-24 flex-shrink-0 bg-slate-100 rounded-[2rem] flex flex-col items-center justify-center gap-2 cursor-pointer border-2 border-dashed border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 transition-all text-slate-400">
                                            <i data-lucide="upload" className="w-6 h-6"></i>
                                            <span className="text-[10px] font-bold uppercase">Upload</span>
                                            <input type="file" multiple className="hidden" accept="image/*" onChange={e => {
                                                const files = Array.from(e.target.files);
                                                files.forEach(file => {
                                                    const r = new FileReader();
                                                    r.onload = () => setForm(f => ({...f, tempImages: [...f.tempImages, r.result]}));
                                                    r.readAsDataURL(file);
                                                });
                                            }} />
                                        </label>

                                        {form.tempImages.map((img, i) => (
                                            <div key={i} className="relative group flex-shrink-0">
                                                <img src={img} className="w-24 h-24 rounded-[2rem] object-cover ring-4 ring-white shadow-md" />
                                                <button 
                                                    onClick={() => setForm(f => ({ ...f, tempImages: f.tempImages.filter((_, idx) => idx !== i) }))}
                                                    className="absolute -top-1 -right-1 w-6 h-6 bg-rose-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                                                >
                                                    <i data-lucide="x" className="w-3 h-3"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>

                                    {isCameraOpen && (
                                        <div className="camera-overlay rounded-[2.5rem] aspect-video w-full mb-4 shadow-inner ring-4 ring-indigo-50 relative animate-in slide-in-from-top-4">
                                            <video ref={videoRef} id="camera-video" autoPlay playsInline></video>
                                            <div className="absolute bottom-6 left-0 right-0 flex justify-center gap-4">
                                                <button onClick={stopCamera} className="w-14 h-14 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/30 hover:bg-white/40">
                                                    <i data-lucide="x"></i>
                                                </button>
                                                <button onClick={capturePhoto} className="w-20 h-20 bg-white rounded-full flex items-center justify-center text-indigo-600 shadow-2xl scale-110 active:scale-90 transition-transform">
                                                    <i data-lucide="aperture" className="w-10 h-10"></i>
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <input 
                                            placeholder="Job ID หรือ ชื่อรายการสินค้า" 
                                            className="w-full bg-white px-6 py-5 rounded-3xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-600 transition-all font-bold text-lg"
                                            value={form.title}
                                            onChange={e => setForm({...form, title: e.target.value})}
                                        />
                                        <textarea 
                                            placeholder="ระบุรายละเอียดหรือข้อสังเกตเพิ่มเติม..." 
                                            className="w-full bg-white px-6 py-5 rounded-3xl outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-600 transition-all h-32 text-sm"
                                            value={form.detail}
                                            onChange={e => setForm({...form, detail: e.target.value})}
                                        ></textarea>
                                    </div>

                                    <button 
                                        onClick={async () => {
                                            setIsAnalyzing(true);
                                            const { collection, addDoc, serverTimestamp } = window.FB;
                                            
                                            // Enhanced AI Pre-scan using Gemini
                                            let analysis = "";
                                            if(form.tempImages.length > 0) {
                                                analysis = await callGemini(
                                                    "ในฐานะผู้เชี่ยวชาญด้าน QC ตรวจสอบรูปภาพนี้ว่ามีจุดบกพร่อง รอยขีดข่วน หรือความไม่เรียบร้อยตรงไหนบ้าง และสรุปผลเบื้องต้นสั้นๆ (ไม่เกิน 2 ประโยค)", 
                                                    form.tempImages[0]
                                                );
                                            }

                                            const orderRef = await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders'), {
                                                title: form.title,
                                                detail: form.detail,
                                                aiAnalysis: analysis,
                                                timestamp: serverTimestamp(),
                                                qcStatus: 'pending',
                                                uid: user.uid
                                            });
                                            for (const src of form.tempImages) {
                                                await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', orderRef.id, 'images'), { src });
                                            }
                                            setForm({ title: '', detail: '', tempImages: [], aiAnalysis: '' });
                                            setIsAdding(false);
                                            setIsAnalyzing(false);
                                        }}
                                        disabled={isAnalyzing || !form.title}
                                        className="w-full py-6 bg-indigo-600 text-white rounded-[2.5rem] font-black text-lg shadow-2xl shadow-indigo-100 hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-50 flex items-center justify-center gap-3"
                                    >
                                        {isAnalyzing ? (
                                            <>
                                                <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                                <span>✨ AI กำลังวิเคราะห์รูปภาพ...</span>
                                            </>
                                        ) : (
                                            <span>✨ บันทึกข้อมูลและประมวลผลด้วย AI</span>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <canvas ref={canvasRef} className="hidden"></canvas>

                    {/* QC Modal */}
                    {qcModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in zoom-in duration-200">
                            <div className="bg-white w-full max-w-lg rounded-[3rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh] border border-white">
                                <div className="p-8 pb-0 flex justify-between items-start">
                                    <div>
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="px-3 py-1 bg-amber-100 text-amber-600 text-[10px] font-black rounded-full uppercase tracking-tighter">Reviewing</span>
                                            <span className="text-[10px] font-bold text-slate-300">ID: {qcModal.id.slice(-6)}</span>
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-800">{qcModal.title}</h2>
                                    </div>
                                    <button onClick={() => setQcModal(null)} className="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors"><i data-lucide="x"></i></button>
                                </div>
                                
                                <div className="p-8 flex-1 overflow-y-auto custom-scrollbar space-y-8">
                                    <div className="grid grid-cols-2 gap-4">
                                        {qcModal.images?.map((img, i) => (
                                            <div key={i} className="relative group">
                                                <img src={img} className="rounded-3xl object-cover w-full h-48 ring-1 ring-slate-100 shadow-sm" />
                                                <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors rounded-3xl flex items-center justify-center opacity-0 group-hover:opacity-100">
                                                    <i data-lucide="maximize-2" className="text-white"></i>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {qcModal.aiAnalysis && (
                                        <div className="bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100 relative overflow-hidden group">
                                            <div className="flex justify-between items-start mb-2 relative z-10">
                                                <div className="flex items-center gap-2 text-indigo-600">
                                                    <i data-lucide="sparkles" className="w-4 h-4"></i>
                                                    <span className="text-xs font-black uppercase tracking-widest">AI Pre-Scan Report</span>
                                                </div>
                                                <button 
                                                    onClick={() => speakWithGemini(qcModal.aiAnalysis)}
                                                    className="w-8 h-8 bg-white text-indigo-600 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform"
                                                    title="ฟังคำแนะนำเป็นเสียง"
                                                >
                                                    <i data-lucide="volume-2" className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                            <p className="text-xs text-indigo-700 leading-relaxed italic relative z-10">"{qcModal.aiAnalysis}"</p>
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] block">Rating Quality</label>
                                        <div className="flex gap-4 justify-center py-6 bg-slate-50 rounded-[2rem] border border-slate-100">
                                            {[1,2,3,4,5].map(s => (
                                                <button key={s} onClick={() => setQcModal({...qcModal, tempRating: s})} className="transform transition-transform hover:scale-125">
                                                    <i data-lucide="star" className={`w-8 h-8 ${s <= (qcModal.tempRating || qcModal.qcRating || 0) ? 'fill-amber-400 text-amber-400' : 'text-slate-200'}`}></i>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">QC Final Comment</label>
                                            <button 
                                                onClick={async () => {
                                                    setIsAnalyzing(true);
                                                    const res = await callGemini(`งานนี้ได้ ${qcModal.tempRating || 0} ดาว โดย AI สแกนว่า "${qcModal.aiAnalysis}" ช่วยเขียนสรุปฟีดแบ็กเป็นภาษาไทยทางการแต่กระชับให้เจ้าหน้าที่คนงานแก้ไข`);
                                                    setQcModal({...qcModal, tempNote: res});
                                                    setIsAnalyzing(false);
                                                }}
                                                className="text-[10px] font-bold text-indigo-600 flex items-center gap-2 bg-indigo-50 px-4 py-2 rounded-full hover:bg-indigo-100 transition-colors"
                                            >
                                                <i data-lucide="wand-2" className="w-3 h-3"></i> ✨ AI ช่วยร่างฟีดแบ็ก
                                            </button>
                                        </div>
                                        <textarea 
                                            className="w-full bg-slate-50 p-6 rounded-[2rem] border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-600 transition-all text-sm h-32"
                                            value={qcModal.tempNote !== undefined ? qcModal.tempNote : (qcModal.qcNote || '')}
                                            onChange={e => setQcModal({...qcModal, tempNote: e.target.value})}
                                            placeholder="ระบุข้อควรระวังหรือสิ่งที่ต้องแก้ไข..."
                                        ></textarea>
                                    </div>
                                </div>
                                <div className="p-8 pt-0 grid grid-cols-2 gap-4">
                                    <button onClick={() => saveQC('rejected', qcModal.tempRating || 0, qcModal.tempNote || '')} className="py-6 bg-rose-50 text-rose-600 rounded-[2rem] font-black hover:bg-rose-100 transition-colors uppercase tracking-widest text-sm">Reject Item</button>
                                    <button onClick={() => saveQC('passed', qcModal.tempRating || 0, qcModal.tempNote || '')} className="py-6 bg-slate-900 text-white rounded-[2rem] font-black shadow-xl hover:bg-indigo-600 transition-all uppercase tracking-widest text-sm">Pass Item</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
