<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync AI Pro | Fully Functional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .ai-shimmer {
            background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .grid-bg {
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 32px 32px;
        }

        .status-badge {
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="grid-bg">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // --- DATABASE HELPER (IndexedDB for Local Storage) ---
        // ใช้เก็บข้อมูลในเครื่องได้ไม่จำกัดพื้นที่ (แก้ QuotaExceededError)
        const dbName = "WorkSyncDB";
        const storeName = "AuditLogs";

        const openDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        db.createObjectStore(storeName, { keyPath: "id" });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        };

        const saveLocal = async (data) => {
            const db = await openDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).put(data);
            return tx.complete;
        };

        const getAllLocal = async () => {
            const db = await openDB();
            return new Promise((resolve) => {
                const tx = db.transaction(storeName, "readonly");
                const request = tx.objectStore(storeName).getAll();
                request.onsuccess = () => resolve(request.result);
            });
        };

        const deleteLocal = async (id) => {
            const db = await openDB();
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).delete(id);
        };

        const App = () => {
            // กรุณาใส่ API Key ของคุณที่นี่เพื่อใช้ระบบวิเคราะห์รูปภาพ
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_key') || ""); 
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [qcModal, setQcModal] = useState(null);
            const [activeTab, setActiveTab] = useState('all');
            const [form, setForm] = useState({ title: '', detail: '', tempImages: [] });
            const [mode, setMode] = useState('initializing'); 
            
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const [cameraActive, setCameraActive] = useState(false);

            const dbRef = useRef(null);
            const authRef = useRef(null);

            // --- INITIALIZATION ---
            useEffect(() => {
                const init = async () => {
                    if (typeof __firebase_config === 'undefined') {
                        setMode('local');
                        setUser({ uid: 'local-user' });
                        const localData = await getAllLocal();
                        setOrders(localData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                    } else {
                        try {
                            const firebaseConfig = JSON.parse(__firebase_config);
                            const app = initializeApp(firebaseConfig);
                            authRef.current = getAuth(app);
                            dbRef.current = getFirestore(app);

                            const initAuth = async () => {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await signInWithCustomToken(authRef.current, __initial_auth_token);
                                } else {
                                    await signInAnonymously(authRef.current);
                                }
                            };
                            await initAuth();

                            onAuthStateChanged(authRef.current, (u) => {
                                if (u) {
                                    setUser(u);
                                    setMode('cloud');
                                }
                            });
                        } catch (err) {
                            setMode('local');
                            setUser({ uid: 'local-user' });
                        }
                    }
                };
                init();
            }, []);

            // --- CLOUD SYNC ---
            useEffect(() => {
                if (mode !== 'cloud' || !user) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-pro';
                const q = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders');
                return onSnapshot(q, (snap) => {
                    const items = [];
                    snap.forEach(doc => items.push({id: doc.id, ...doc.data()}));
                    setOrders(items.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                }, (err) => console.error("Sync Error:", err));
            }, [mode, user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [orders, isAdding, qcModal, cameraActive, mode]);

            // --- AI LOGIC ---
            const analyzeImage = async (base64) => {
                if (!geminiKey) return "⚠️ ไม่ได้ใส่ API Key: กรุณาคลิกที่รูปฟันเฟืองด้านล่างเพื่อตั้งค่า Key สำหรับใช้งาน AI";
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`;
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "ในฐานะผู้เชี่ยวชาญ QC: ตรวจสอบรูปภาพนี้ว่ามีความผิดปกติหรือจุดบกพร่องอะไรบ้าง (สรุปเป็นข้อๆ สั้นๆ ภาษาไทย)" },
                                    { inlineData: { mimeType: "image/jpeg", data: base64.split(',')[1] } }
                                ]
                            }]
                        })
                    });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI ไม่สามารถอ่านภาพได้";
                } catch (e) { return "เกิดข้อผิดพลาดในการเชื่อมต่อ AI"; }
            };

            // --- ACTIONS ---
            const handleSave = async () => {
                if (!form.title || !form.tempImages[0]) return;
                setIsProcessing(true);
                
                const id = 'AUDIT-' + Date.now();
                const newAudit = {
                    id,
                    title: form.title,
                    images: [form.tempImages[0]],
                    aiAnalysis: "กำลังวิเคราะห์ด้วย AI...",
                    qcStatus: 'pending',
                    timestamp: new Date().toISOString(),
                };

                if (mode === 'cloud') {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-pro';
                    await setDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id), newAudit);
                    const aiResult = await analyzeImage(form.tempImages[0]);
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id), { aiAnalysis: aiResult });
                } else {
                    await saveLocal(newAudit);
                    setOrders(prev => [newAudit, ...prev]);
                    const aiResult = await analyzeImage(form.tempImages[0]);
                    const updated = { ...newAudit, aiAnalysis: aiResult };
                    await saveLocal(updated);
                    setOrders(prev => prev.map(o => o.id === id ? updated : o));
                }

                setIsAdding(false);
                setForm({ title: '', detail: '', tempImages: [] });
                setIsProcessing(false);
            };

            const toggleCamera = async () => {
                if (cameraActive) {
                    streamRef.current?.getTracks().forEach(t => t.stop());
                    setCameraActive(false);
                } else {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                        streamRef.current = s;
                        videoRef.current.srcObject = s;
                        setCameraActive(true);
                    } catch (err) { alert("ไม่สามารถเข้าถึงกล้องได้"); }
                }
            };

            const capture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                setForm(f => ({ ...f, tempImages: [canvas.toDataURL('image/jpeg', 0.7)] }));
                toggleCamera();
            };

            if (mode === 'initializing') {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-950">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-slate-500 font-black uppercase text-[10px] tracking-widest">System Booting...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="hidden lg:flex w-72 glass-dark flex-col p-8 z-20">
                        <div className="flex items-center gap-4 mb-12">
                            <div className="w-10 h-10 rounded-2xl ai-shimmer p-[2px]">
                                <div className="w-full h-full bg-slate-950 rounded-[14px] flex items-center justify-center">
                                    <i data-lucide="scan-eye" className="text-white w-5 h-5"></i>
                                </div>
                            </div>
                            <h1 className="font-black text-xl tracking-tight uppercase italic">Work<span className="text-indigo-500">Sync</span></h1>
                        </div>

                        <nav className="space-y-2">
                            {['all', 'pending', 'passed'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === tab ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:bg-white/5'}`}>
                                    <i data-lucide={tab === 'all' ? 'layout' : tab === 'passed' ? 'check-circle' : 'clock'} className="w-5 h-5"></i>
                                    <span className="font-bold text-sm capitalize">{tab}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto pt-6 space-y-4">
                            <div className="p-4 rounded-2xl bg-white/5 space-y-2">
                                <label className="text-[9px] font-black text-slate-500 uppercase">AI API Key</label>
                                <input 
                                    type="password" 
                                    placeholder="Paste Gemini Key..." 
                                    className="w-full bg-slate-900 border border-white/10 rounded-lg p-2 text-xs text-indigo-400"
                                    value={geminiKey}
                                    onChange={e => {
                                        setGeminiKey(e.target.value);
                                        localStorage.setItem('gemini_key', e.target.value);
                                    }}
                                />
                            </div>
                            <div className={`p-4 rounded-2xl text-[9px] font-black uppercase flex items-center gap-3 ${mode === 'cloud' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}`}>
                                <div className={`w-1.5 h-1.5 rounded-full ${mode === 'cloud' ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`}></div>
                                {mode === 'cloud' ? 'Cloud Server' : 'Local Persistence'}
                            </div>
                        </div>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-6 lg:p-12 pb-24">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                            <div>
                                <h2 className="text-4xl font-black text-white italic uppercase tracking-tighter">Inventory Audit</h2>
                                <p className="text-slate-500 text-sm font-medium">Smart AI Quality Inspection Dashboard</p>
                            </div>
                            <button onClick={() => setIsAdding(true)} className="px-10 py-5 bg-white text-slate-950 rounded-2xl font-black text-xs uppercase tracking-[0.15em] hover:scale-105 transition-all shadow-xl shadow-white/5">
                                + Start Audit
                            </button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                            {orders.filter(o => activeTab === 'all' || o.qcStatus === activeTab).map(o => (
                                <div key={o.id} className="glass-dark rounded-[2.5rem] p-6 group hover:border-indigo-500/40 transition-all cursor-pointer" onClick={() => setQcModal(o)}>
                                    <div className="relative aspect-[4/3] rounded-[1.8rem] overflow-hidden bg-slate-900 mb-6">
                                        <img src={o.images[0]} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        <div className="absolute top-4 right-4">
                                            <span className={`status-badge ${o.qcStatus === 'passed' ? 'bg-emerald-500 text-white' : 'bg-amber-500 text-white'}`}>
                                                {o.qcStatus}
                                            </span>
                                        </div>
                                    </div>
                                    <h3 className="text-lg font-bold text-white mb-2 truncate">{o.title}</h3>
                                    <p className="text-xs text-slate-500 line-clamp-2 font-medium italic">"{o.aiAnalysis}"</p>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Create Modal */}
                    {isAdding && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
                            <div className="glass-dark w-full max-w-xl rounded-[3rem] p-8 md:p-12 max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase italic">New Audit Log</h3>
                                    <button onClick={() => { setIsAdding(false); if(cameraActive) toggleCamera(); }} className="text-slate-500 hover:text-white"><i data-lucide="x"></i></button>
                                </div>

                                <div className="space-y-6">
                                    {cameraActive ? (
                                        <div className="relative rounded-[2.5rem] overflow-hidden aspect-square md:aspect-video bg-black shadow-2xl">
                                            <video ref={videoRef} className="w-full h-full object-cover" autoPlay playsInline></video>
                                            <button onClick={capture} className="absolute bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-full flex items-center justify-center text-slate-950 shadow-2xl active:scale-90 transition-transform"><i data-lucide="camera" className="w-8 h-8"></i></button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-4">
                                            {form.tempImages[0] ? (
                                                <div className="aspect-video rounded-[2.5rem] overflow-hidden relative shadow-2xl">
                                                    <img src={form.tempImages[0]} className="w-full h-full object-cover" />
                                                    <button onClick={() => setForm({...form, tempImages: []})} className="absolute top-4 right-4 bg-black/60 p-3 rounded-full hover:bg-black"><i data-lucide="refresh-cw" className="w-4 h-4 text-white"></i></button>
                                                </div>
                                            ) : (
                                                <button onClick={toggleCamera} className="aspect-video bg-indigo-600 rounded-[2.5rem] flex flex-col items-center justify-center gap-3 hover:bg-indigo-500 transition-all shadow-2xl group border-2 border-indigo-400/20">
                                                    <div className="w-14 h-14 rounded-full bg-white/20 flex items-center justify-center group-hover:scale-110 transition-transform"><i data-lucide="camera" className="text-white w-6 h-6"></i></div>
                                                    <span className="text-[11px] font-black uppercase tracking-[0.2em] text-white">Activate Scanner</span>
                                                </button>
                                            )}
                                        </div>
                                    )}
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest px-2">Job Reference</label>
                                        <input 
                                            placeholder="Ex. Batch-A102 / Cargo Check" 
                                            className="w-full bg-white/5 p-5 rounded-2xl outline-none ring-1 ring-white/10 focus:ring-2 focus:ring-indigo-500 font-bold transition-all text-white" 
                                            value={form.title} 
                                            onChange={e => setForm({...form, title: e.target.value})} 
                                        />
                                    </div>
                                    <button 
                                        onClick={handleSave} 
                                        disabled={!form.title || !form.tempImages[0] || isProcessing} 
                                        className="w-full py-6 ai-shimmer text-white rounded-[2rem] font-black uppercase tracking-widest text-xs disabled:opacity-20 shadow-2xl shadow-indigo-500/20"
                                    >
                                        {isProcessing ? "Processing via AI..." : "Push to System"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Report Modal */}
                    {qcModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/98 backdrop-blur-2xl">
                            <div className="glass-dark w-full max-w-6xl h-[90vh] rounded-[3.5rem] overflow-hidden flex flex-col md:flex-row border border-white/10 shadow-3xl">
                                <div className="w-full md:w-1/2 bg-black flex items-center justify-center relative">
                                    <img src={qcModal.images[0]} className="w-full h-full object-contain" />
                                    <button onClick={() => setQcModal(null)} className="absolute top-6 left-6 w-12 h-12 bg-black/50 backdrop-blur rounded-full flex items-center justify-center text-white md:hidden"><i data-lucide="arrow-left"></i></button>
                                </div>
                                <div className="flex-1 p-8 md:p-12 flex flex-col overflow-y-auto custom-scrollbar bg-slate-950/50">
                                    <div className="mb-10 flex justify-between items-start">
                                        <div>
                                            <div className="flex items-center gap-3 mb-4">
                                                <span className="px-3 py-1 bg-indigo-500/20 text-indigo-400 rounded-lg text-[10px] font-black uppercase tracking-widest">Inspection Report</span>
                                                <span className="text-slate-600 text-[10px] font-bold uppercase">{new Date(qcModal.timestamp).toLocaleString()}</span>
                                            </div>
                                            <h2 className="text-3xl md:text-5xl font-black uppercase italic text-white leading-none">{qcModal.title}</h2>
                                        </div>
                                        <button onClick={() => setQcModal(null)} className="hidden md:block text-slate-500 hover:text-white"><i data-lucide="x" className="w-8 h-8"></i></button>
                                    </div>

                                    <div className="bg-indigo-500/5 p-8 rounded-[2.5rem] border border-indigo-500/10 mb-10 flex-1">
                                        <div className="flex items-center gap-3 mb-6 text-indigo-400">
                                            <div className="w-8 h-8 rounded-full bg-indigo-500/10 flex items-center justify-center"><i data-lucide="brain-circuit" className="w-4 h-4"></i></div>
                                            <span className="text-[11px] font-black uppercase tracking-[0.2em]">AI Audit Log</span>
                                        </div>
                                        <p className="text-slate-300 text-base leading-relaxed whitespace-pre-line font-medium">{qcModal.aiAnalysis}</p>
                                    </div>

                                    <div className="flex gap-4">
                                        <button 
                                            onClick={async () => {
                                                if(mode === 'cloud') {
                                                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-pro';
                                                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', qcModal.id), { qcStatus: 'passed' });
                                                } else {
                                                    const updated = {...qcModal, qcStatus: 'passed'};
                                                    await saveLocal(updated);
                                                    setOrders(prev => prev.map(o => o.id === qcModal.id ? updated : o));
                                                }
                                                setQcModal(null);
                                            }}
                                            className="flex-1 py-6 bg-emerald-500 text-white rounded-[2rem] font-black uppercase tracking-widest text-xs shadow-2xl shadow-emerald-500/20 hover:bg-emerald-400 transition-all"
                                        >
                                            Approve Job
                                        </button>
                                        <button 
                                            onClick={async () => {
                                                if(mode === 'cloud') {
                                                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-pro';
                                                    await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', qcModal.id));
                                                } else {
                                                    await deleteLocal(qcModal.id);
                                                    setOrders(prev => prev.filter(o => o.id !== qcModal.id));
                                                }
                                                setQcModal(null);
                                            }}
                                            className="px-8 py-6 bg-rose-500/10 text-rose-500 rounded-[2rem] font-black uppercase tracking-widest text-xs border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all"
                                        >
                                            <i data-lucide="trash-2"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
