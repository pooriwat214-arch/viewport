<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync Pro - AI Smart QC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .order-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .qc-passed { border-left: 8px solid #22c55e; }
        .qc-rejected { border-left: 8px solid #ef4444; }
        .qc-pending { border-left: 8px solid #e2e8f0; }
        .star-active { color: #f59e0b; fill: #f59e0b; }
        .star-inactive { color: #cbd5e1; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        .animate-sparkle { animation: sparkle 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy, getDocs, deleteDoc, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy, getDocs, deleteDoc, writeBatch, updateDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const apiKey = ""; // API Key provided by the environment
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [qcModal, setQcModal] = useState(null);
            const [showInsights, setShowInsights] = useState(false);
            const [aiInsights, setAiInsights] = useState("");
            const [activePreview, setActivePreview] = useState(null);
            const [form, setForm] = useState({ title: '', detail: '', tempImages: [], aiAnalysis: '' });
            
            const dbRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-ai-qc-v1';

            useEffect(() => {
                const init = async () => {
                    if (!window.FB) return;
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FB;
                    const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"AIzaSyDfnz6oOdNuWflcjgr_5cBkrQOCIXcwfHw","authDomain":"myworklog-fd954.firebaseapp.com","projectId":"myworklog-fd954"}');
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    dbRef.current = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                    onAuthStateChanged(auth, u => { if(u) setUser(u); });
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, query, onSnapshot, orderBy, getDocs } = window.FB;
                const ordersRef = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders');
                const q = query(ordersRef, orderBy('timestamp', 'desc'));

                return onSnapshot(q, async (snapshot) => {
                    const orderData = await Promise.all(snapshot.docs.map(async (orderDoc) => {
                        const id = orderDoc.id;
                        const data = orderDoc.data();
                        const imgsSnap = await getDocs(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id, 'images'));
                        const images = imgsSnap.docs.map(d => d.data().src);
                        return { id, ...data, images };
                    }));
                    setOrders(orderData);
                });
            }, [user]);

            // Gemini API Wrapper
            const callGemini = async (prompt, imageData = null, retries = 5) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                let parts = [{ text: prompt }];
                if (imageData) {
                    parts.push({ inlineData: { mimeType: "image/png", data: imageData.split(',')[1] } });
                }

                const contents = [{ role: "user", parts }];

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents })
                        });
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "ขออภัย ไม่สามารถประมวลผลได้ในขณะนี้";
                    } catch (error) {
                        if (i === retries - 1) throw error;
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    }
                }
            };

            const analyzeWithAI = async () => {
                if (form.tempImages.length === 0) return;
                setIsAnalyzing(true);
                try {
                    const analysis = await callGemini(
                        "วิเคราะห์รูปภาพนี้เพื่อการควบคุมคุณภาพ (QC) ระบุรายละเอียด ความสะอาด หรือตำหนิที่เห็นได้ชัด สรุปเป็นภาษาไทยในโทนที่เป็นมืออาชีพและกระชับ",
                        form.tempImages[0]
                    );
                    setForm(prev => ({ ...prev, aiAnalysis: analysis }));
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const improveContentWithAI = async () => {
                if (!form.title) return;
                setIsAnalyzing(true);
                try {
                    const prompt = `ช่วยปรับปรุงชื่อออเดอร์ "${form.title}" และรายละเอียด "${form.detail}" ให้ดูเป็นมืออาชีพและชัดเจนมากขึ้นสำหรับการทำงานในระบบ QC ตอบกลับเป็นรูปแบบ JSON { "title": "...", "detail": "..." } เท่านั้น และเป็นภาษาไทย`;
                    const resultText = await callGemini(prompt);
                    try {
                        const cleanedJson = resultText.replace(/```json|```/g, "").trim();
                        const data = JSON.parse(cleanedJson);
                        setForm(prev => ({ ...prev, title: data.title, detail: data.detail }));
                    } catch (err) {
                        setForm(prev => ({ ...prev, detail: resultText }));
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const generateAIFeedback = async () => {
                const rating = qcModal.tempRating || qcModal.qcRating || 0;
                const status = qcModal.status;
                setIsAnalyzing(true);
                try {
                    const prompt = `เขียนข้อเสนอแนะสำหรับการตรวจสอบคุณภาพ (QC) เป็นภาษาไทย สำหรับงานที่ได้ ${rating}/5 ดาว และสถานะคือ ${status === 'passed' ? 'ผ่าน' : 'ไม่ผ่าน'} โดยให้คำแนะนำที่สร้างสรรค์และเป็นมืออาชีพ`;
                    const feedback = await callGemini(prompt);
                    setQcModal(prev => ({ ...prev, tempNote: feedback }));
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const generateOverallInsights = async () => {
                if (orders.length === 0) return;
                setIsAnalyzing(true);
                setShowInsights(true);
                try {
                    const orderSummary = orders.map(o => `ออเดอร์: ${o.title}, สถานะ QC: ${o.qcStatus}, คะแนน: ${o.qcRating}`).join("\n");
                    const prompt = `จากข้อมูลออเดอร์ดังนี้:\n${orderSummary}\nช่วยสรุปภาพรวมคุณภาพงาน (Insights) ปัญหาที่พบบ่อย และคำแนะนำในการพัฒนาทีมงานในอนาคต สรุปเป็นภาษาไทยแบบ Bullet points`;
                    const insights = await callGemini(prompt);
                    setAiInsights(insights);
                } catch (e) {
                    setAiInsights("ไม่สามารถดึงข้อมูลได้ในขณะนี้");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const saveQC = async (qcData) => {
                try {
                    const { doc, updateDoc } = window.FB;
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', qcModal.id), {
                        qcStatus: qcData.status,
                        qcRating: qcData.rating,
                        qcNote: qcData.note,
                        status: qcData.status === 'passed' ? 'done' : 'process'
                    });
                    setQcModal(null);
                } catch (e) { alert(e.message); }
            };

            const saveOrder = async () => {
                if (!form.title) return;
                setIsSaving(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.FB;
                    const orderRef = await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders'), {
                        title: form.title,
                        detail: form.detail,
                        aiAnalysis: form.aiAnalysis,
                        timestamp: serverTimestamp(),
                        uid: user.uid,
                        qcStatus: 'pending'
                    });
                    for (const src of form.tempImages) {
                        await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', orderRef.id, 'images'), { src });
                    }
                    setForm({ title: '', detail: '', tempImages: [], aiAnalysis: '' });
                    setIsAdding(false);
                } catch (e) { alert(e.message); } finally { setIsSaving(false); }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [orders, isAdding, qcModal, isAnalyzing, showInsights]);

            return (
                <div className="min-h-screen pb-20">
                    <nav className="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                <i data-lucide="sparkles" className="animate-sparkle w-6 h-6"></i>
                            </div>
                            <h1 className="font-black text-xl tracking-tight uppercase italic">WorkSync <span className="text-indigo-600">Smart QC</span></h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={generateOverallInsights} className="p-2.5 bg-slate-100 text-slate-600 rounded-2xl hover:bg-indigo-50 hover:text-indigo-600 transition-all">
                                <i data-lucide="line-chart" className="w-5 h-5"></i>
                            </button>
                            <button onClick={() => setIsAdding(true)} className="bg-indigo-600 text-white px-6 py-2.5 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-200 hover:scale-105 transition-transform">
                                + เพิ่มงาน
                            </button>
                        </div>
                    </nav>

                    <main className="p-6 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {orders.map(o => (
                            <div key={o.id} className={`order-card p-6 flex flex-col qc-${o.qcStatus || 'pending'} hover:shadow-xl transition-shadow`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className="flex-1 pr-4">
                                        <h3 className="font-black text-slate-900 leading-tight text-lg">{o.title}</h3>
                                        <div className="flex gap-1 mt-1">
                                            {[1, 2, 3, 4, 5].map(star => (
                                                <i key={star} data-lucide="star" className={`w-3.5 h-3.5 ${star <= (o.qcRating || 0) ? 'star-active' : 'star-inactive'}`}></i>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => setQcModal(o)} className="p-2.5 bg-slate-50 hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 rounded-2xl transition-all border border-slate-100">
                                        <i data-lucide="clipboard-check" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <p className="text-sm text-slate-500 mb-4 line-clamp-2">{o.detail || '-'}</p>
                                
                                <div className="grid grid-cols-4 gap-2 mb-4">
                                    {o.images?.slice(0, 4).map((img, i) => (
                                        <div key={i} className="aspect-square rounded-xl overflow-hidden cursor-pointer hover:opacity-80 transition-opacity ring-1 ring-slate-100" onClick={() => setActivePreview(img)}>
                                            <img src={img} className="w-full h-full object-cover" />
                                        </div>
                                    ))}
                                </div>

                                {o.aiAnalysis && (
                                    <div className="bg-indigo-50/40 p-3 rounded-2xl mb-4 border border-indigo-100/50">
                                        <div className="flex items-center gap-1.5 mb-1">
                                            <i data-lucide="sparkles" className="w-3 h-3 text-indigo-500"></i>
                                            <span className="text-[10px] font-black text-indigo-500 uppercase tracking-wider">AI Pre-Analysis</span>
                                        </div>
                                        <p className="text-[11px] text-slate-600 leading-relaxed line-clamp-3">{o.aiAnalysis}</p>
                                    </div>
                                )}

                                {o.qcNote && (
                                    <div className="bg-slate-50 p-3 rounded-2xl mb-4 border border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">QC Feedback:</p>
                                        <p className="text-xs text-slate-600 italic">"{o.qcNote}"</p>
                                    </div>
                                )}

                                <div className="mt-auto flex justify-between items-center pt-4 border-t border-slate-50">
                                    <span className={`text-[10px] font-black uppercase px-2.5 py-1.5 rounded-lg ${o.qcStatus === 'passed' ? 'bg-emerald-100 text-emerald-700' : o.qcStatus === 'rejected' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-500'}`}>
                                        {o.qcStatus === 'passed' ? 'ผ่าน' : o.qcStatus === 'rejected' ? 'ต้องแก้ไข' : 'รอตรวจ'}
                                    </span>
                                    <span className="text-[10px] font-bold text-slate-400">
                                        {o.timestamp ? new Date(o.timestamp.seconds * 1000).toLocaleDateString() : 'กำลังโหลด...'}
                                    </span>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* AI Insights Modal */}
                    {showInsights && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-2xl rounded-[2.5rem] p-8 shadow-2xl animate-in overflow-y-auto max-h-[85vh] scrollbar-hide">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black flex items-center gap-2">
                                        <i data-lucide="line-chart" className="text-indigo-600"></i> ✨ ภาพรวมคุณภาพงาน (AI)
                                    </h2>
                                    <button onClick={() => setShowInsights(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                                        <i data-lucide="x" className="w-6 h-6 text-slate-400"></i>
                                    </button>
                                </div>
                                
                                {isAnalyzing ? (
                                    <div className="flex flex-col items-center justify-center py-20 gap-4">
                                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                        <p className="font-bold text-slate-400 animate-pulse">AI กำลังวิเคราะห์ข้อมูล...</p>
                                    </div>
                                ) : (
                                    <div className="prose prose-slate max-w-none">
                                        <div className="bg-indigo-50/50 p-6 rounded-3xl border border-indigo-100 whitespace-pre-wrap text-slate-700 leading-relaxed text-sm">
                                            {aiInsights}
                                        </div>
                                        <div className="mt-8 grid grid-cols-2 gap-4">
                                            <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                                <p className="text-[10px] font-black text-emerald-600 uppercase mb-1">Pass Rate</p>
                                                <p className="text-2xl font-black text-emerald-700">
                                                    {orders.length ? Math.round((orders.filter(o => o.qcStatus === 'passed').length / orders.length) * 100) : 0}%
                                                </p>
                                            </div>
                                            <div className="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                                                <p className="text-[10px] font-black text-amber-600 uppercase mb-1">Avg. Rating</p>
                                                <p className="text-2xl font-black text-amber-700">
                                                    {(orders.reduce((acc, o) => acc + (o.qcRating || 0), 0) / orders.length || 0).toFixed(1)}/5
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* QC Modal */}
                    {qcModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black flex items-center gap-2">
                                        <i data-lucide="clipboard-check" className="text-indigo-600"></i> ตรวจสอบคุณภาพ
                                    </h2>
                                    <button onClick={() => setQcModal(null)} className="p-1 hover:bg-slate-100 rounded-full transition-colors">
                                        <i data-lucide="x" className="w-5 h-5 text-slate-400"></i>
                                    </button>
                                </div>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block tracking-wider">ประเมินคุณภาพ (Rating)</label>
                                        <div className="flex gap-3 justify-center bg-slate-50 p-5 rounded-3xl border border-slate-100">
                                            {[1, 2, 3, 4, 5].map(star => (
                                                <button key={star} onClick={() => setQcModal({...qcModal, tempRating: star})} className="hover:scale-110 transition-transform">
                                                    <i data-lucide="star" className={`w-9 h-9 ${star <= (qcModal.tempRating || qcModal.qcRating || 0) ? 'star-active' : 'star-inactive'}`}></i>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-wider">หมายเหตุ / Feedback</label>
                                            <button 
                                                onClick={generateAIFeedback}
                                                disabled={isAnalyzing}
                                                className="text-[11px] font-bold text-indigo-600 flex items-center gap-1 bg-indigo-50 px-3 py-1 rounded-full hover:bg-indigo-100 transition-colors disabled:opacity-50"
                                            >
                                                {isAnalyzing ? '...' : <><i data-lucide="sparkles" className="w-3.5 h-3.5 animate-sparkle"></i> ✨ AI ช่วยร่าง</>}
                                            </button>
                                        </div>
                                        <textarea 
                                            placeholder="เขียนข้อเสนอแนะที่นี่..."
                                            className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 ring-indigo-200 h-28 text-sm transition-all"
                                            value={qcModal.tempNote !== undefined ? qcModal.tempNote : (qcModal.qcNote || '')}
                                            onChange={e => setQcModal({...qcModal, tempNote: e.target.value})}
                                        ></textarea>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <button 
                                            onClick={() => saveQC({ status: 'rejected', rating: qcModal.tempRating || 0, note: qcModal.tempNote || '' })}
                                            className="py-4 bg-white text-red-600 rounded-2xl font-bold border-2 border-red-50 hover:bg-red-50 transition-colors"
                                        >
                                            Reject
                                        </button>
                                        <button 
                                            onClick={() => saveQC({ status: 'passed', rating: qcModal.tempRating || 0, note: qcModal.tempNote || '' })}
                                            className="py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:scale-[1.02] transition-transform"
                                        >
                                            Pass งาน
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Add with AI Analysis */}
                    {isAdding && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xl rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[92vh] scrollbar-hide animate-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black">บันทึกงานใหม่</h2>
                                    <button onClick={() => setIsAdding(false)} className="p-1 hover:bg-slate-100 rounded-full transition-colors">
                                        <i data-lucide="x" className="w-5 h-5 text-slate-400"></i>
                                    </button>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-slate-50 rounded-3xl p-6 text-center border-2 border-dashed border-slate-200 hover:border-indigo-300 transition-colors group">
                                        <label className="cursor-pointer block">
                                            <i data-lucide="upload-cloud" className="w-10 h-10 mx-auto text-slate-300 mb-2 group-hover:text-indigo-400 transition-colors"></i>
                                            <span className="text-xs font-black text-slate-400 uppercase tracking-widest">เลือกรูปภาพงาน</span>
                                            <input type="file" multiple className="hidden" accept="image/*" onChange={e => {
                                                const files = Array.from(e.target.files);
                                                files.forEach(file => {
                                                    const r = new FileReader();
                                                    r.onload = () => setForm(f => ({...f, tempImages: [...f.tempImages, r.result]}));
                                                    r.readAsDataURL(file);
                                                });
                                            }} />
                                        </label>
                                    </div>

                                    {form.tempImages.length > 0 && (
                                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                            {form.tempImages.map((img, i) => (
                                                <img key={i} src={img} className="w-20 h-20 rounded-2xl object-cover flex-shrink-0 ring-2 ring-white shadow-sm" />
                                            ))}
                                        </div>
                                    )}

                                    <div className="flex gap-2">
                                        {form.tempImages.length > 0 && !form.aiAnalysis && (
                                            <button 
                                                onClick={analyzeWithAI}
                                                disabled={isAnalyzing}
                                                className="flex-1 py-3 bg-indigo-50 text-indigo-600 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 border border-indigo-100 hover:bg-indigo-100 transition-colors disabled:opacity-50"
                                            >
                                                {isAnalyzing ? '...' : <><i data-lucide="sparkles" className="w-4 h-4 animate-sparkle"></i> ✨ วิเคราะห์รูปภาพ (AI)</>}
                                            </button>
                                        )}
                                        <button 
                                            onClick={improveContentWithAI}
                                            disabled={isAnalyzing || !form.title}
                                            className="flex-1 py-3 bg-slate-50 text-slate-600 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 border border-slate-100 hover:bg-slate-100 transition-colors disabled:opacity-50"
                                        >
                                            {isAnalyzing ? '...' : <><i data-lucide="sparkles" className="w-4 h-4"></i> ✨ ปรับสำนวน (AI)</>}
                                        </button>
                                    </div>

                                    {form.aiAnalysis && (
                                        <div className="bg-indigo-50/50 p-5 rounded-3xl border border-indigo-100/50 animate-in">
                                            <p className="text-[10px] font-black text-indigo-500 uppercase tracking-wider mb-2 flex items-center gap-1">
                                                <i data-lucide="sparkles" className="w-3 h-3"></i> AI Pre-Analysis Report
                                            </p>
                                            <p className="text-xs text-slate-600 leading-relaxed italic">"{form.aiAnalysis}"</p>
                                        </div>
                                    )}

                                    <div className="space-y-3">
                                        <input 
                                            placeholder="ชื่อออเดอร์" 
                                            className="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 focus:ring-2 ring-indigo-200 font-bold transition-all shadow-sm" 
                                            value={form.title} 
                                            onChange={e => setForm({...form, title: e.target.value})} 
                                        />
                                        <textarea 
                                            placeholder="รายละเอียดเพิ่มเติม..." 
                                            className="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 focus:ring-2 ring-indigo-200 h-24 text-sm transition-all shadow-sm" 
                                            value={form.detail} 
                                            onChange={e => setForm({...form, detail: e.target.value})}
                                        ></textarea>
                                    </div>
                                    
                                    <button onClick={saveOrder} className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black disabled:opacity-20 shadow-xl shadow-indigo-100 hover:scale-[1.01] transition-transform text-lg" disabled={!form.title || isSaving}>
                                        {isSaving ? 'กำลังบันทึก...' : 'บันทึกรายการ'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Preview Image */}
                    {activePreview && (
                        <div className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-8 animate-in" onClick={() => setActivePreview(null)}>
                            <img src={activePreview} className="max-w-full max-h-[90vh] object-contain rounded-3xl shadow-2xl ring-4 ring-white/10" />
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
