<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync AI Pro | Hybrid Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .ai-shimmer {
            background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .grid-bg {
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 32px 32px;
        }

        .status-badge {
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="grid-bg">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo } = React;

        // --- UTILITIES ---
        const compressImage = async (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        };

        const App = () => {
            const apiKey = ""; // ใส่ API Key ของคุณที่นี่
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [qcModal, setQcModal] = useState(null);
            const [activeTab, setActiveTab] = useState('all');
            const [form, setForm] = useState({ title: '', detail: '', tempImages: [] });
            const [mode, setMode] = useState('initializing'); // 'cloud' | 'local' | 'initializing'
            
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const [cameraActive, setCameraActive] = useState(false);

            const dbRef = useRef(null);
            const authRef = useRef(null);

            // --- HYBRID INITIALIZATION ---
            useEffect(() => {
                const initSystem = async () => {
                    // ตรวจสอบว่ารันบน Cloud หรือ Local
                    if (typeof __firebase_config === 'undefined') {
                        console.warn("รันในโหมด Local: ระบบจะไม่บันทึกข้อมูลลง Cloud");
                        setMode('local');
                        setUser({ uid: 'local-user', isAnonymous: true });
                        return;
                    }

                    try {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = initializeApp(firebaseConfig);
                        authRef.current = getAuth(app);
                        dbRef.current = getFirestore(app);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(authRef.current, __initial_auth_token);
                        } else {
                            await signInAnonymously(authRef.current);
                        }

                        onAuthStateChanged(authRef.current, (u) => {
                            if (u) {
                                setUser(u);
                                setMode('cloud');
                            }
                        });
                    } catch (err) {
                        console.error("Firebase Init Failed, falling back to Local Mode:", err);
                        setMode('local');
                        setUser({ uid: 'local-user' });
                    }
                };

                initSystem();
            }, []);

            // --- DATA FLOW ---
            useEffect(() => {
                if (mode !== 'cloud' || !user || !dbRef.current) return;

                const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-fixed';
                const q = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders');
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const items = [];
                    snapshot.forEach((doc) => items.push({ id: doc.id, ...doc.data() }));
                    setOrders(items.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                });

                return () => unsubscribe();
            }, [mode, user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [orders, isAdding, qcModal, cameraActive, mode]);

            // --- AI & ACTIONS ---
            const runAI = async (image) => {
                if (!apiKey) return "กรุณาใส่ API Key ในโค้ดเพื่อเริ่มใช้งาน AI Analysis";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                try {
                    const compressed = await compressImage(image);
                    const payload = {
                        contents: [{
                            parts: [
                                { text: "วิเคราะห์ภาพการทำงานนี้: ตรวจสอบความเรียบร้อยและระบุจุดบกพร่อง (สรุปเป็นข้อๆ ภาษาไทย)" },
                                { inlineData: { mimeType: "image/jpeg", data: compressed.split(',')[1] } }
                            ]
                        }]
                    };

                    const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI ไม่สามารถสรุปผลได้";
                } catch (e) {
                    return "เกิดข้อผิดพลาดในการเรียก AI";
                }
            };

            const handleSubmit = async () => {
                if (!form.title) return;
                setIsProcessing(true);
                
                const id = 'ID-' + Date.now();
                const compressedImg = form.tempImages[0] ? await compressImage(form.tempImages[0]) : null;
                
                const newOrder = {
                    id,
                    title: form.title,
                    images: [compressedImg],
                    aiAnalysis: "กำลังประมวลผล...",
                    qcStatus: 'pending',
                    timestamp: new Date().toISOString(),
                };

                if (mode === 'cloud') {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-fixed';
                    await setDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id), newOrder);
                    
                    const analysis = await runAI(compressedImg);
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id), { aiAnalysis: analysis });
                } else {
                    // Local Mode: อัปเดต State โดยตรง
                    setOrders(prev => [newOrder, ...prev]);
                    const analysis = await runAI(compressedImg);
                    setOrders(prev => prev.map(o => o.id === id ? {...o, aiAnalysis: analysis} : o));
                }

                setIsAdding(false);
                setForm({ title: '', detail: '', tempImages: [] });
                setIsProcessing(false);
            };

            const updateStatus = async (id, status) => {
                if (mode === 'cloud') {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-fixed';
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id), { qcStatus: status });
                } else {
                    setOrders(prev => prev.map(o => o.id === id ? {...o, qcStatus: status} : o));
                }
                setQcModal(null);
            };

            const deleteOrder = async (id) => {
                if (mode === 'cloud') {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-fixed';
                    await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id));
                } else {
                    setOrders(prev => prev.filter(o => o.id !== id));
                }
            };

            // --- CAMERA ---
            const toggleCamera = async () => {
                if (cameraActive) {
                    streamRef.current?.getTracks().forEach(t => t.stop());
                    setCameraActive(false);
                } else {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                        streamRef.current = s;
                        videoRef.current.srcObject = s;
                        setCameraActive(true);
                    } catch (err) { alert("Camera access denied"); }
                }
            };

            const capture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                setForm(f => ({ ...f, tempImages: [canvas.toDataURL('image/jpeg', 0.8)] }));
                toggleCamera();
            };

            if (mode === 'initializing') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-950">
                        <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-500 font-bold uppercase tracking-widest text-xs">System Loading...</p>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="hidden lg:flex w-72 glass-dark flex-col p-8 z-20">
                        <div className="flex items-center gap-4 mb-12">
                            <div className="w-10 h-10 rounded-2xl ai-shimmer p-[2px]">
                                <div className="w-full h-full bg-slate-950 rounded-[14px] flex items-center justify-center">
                                    <i data-lucide="shield-check" className="text-white w-5 h-5"></i>
                                </div>
                            </div>
                            <h1 className="font-black text-xl tracking-tight uppercase italic">Work<span className="text-indigo-500">Sync</span></h1>
                        </div>

                        <nav className="space-y-2">
                            {['all', 'pending', 'passed'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === tab ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-500 hover:text-white hover:bg-white/5'}`}>
                                    <i data-lucide={tab === 'all' ? 'layout' : tab === 'passed' ? 'check-circle' : 'clock'} className="w-5 h-5"></i>
                                    <span className="font-bold text-sm capitalize">{tab}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto pt-8 border-t border-white/5">
                            <div className={`p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest flex items-center gap-3 ${mode === 'cloud' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}`}>
                                <div className={`w-2 h-2 rounded-full animate-pulse ${mode === 'cloud' ? 'bg-emerald-500' : 'bg-amber-500'}`}></div>
                                {mode === 'cloud' ? 'Cloud Connected' : 'Local Offline Mode'}
                            </div>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-6 lg:p-12">
                        <header className="flex justify-between items-center mb-12">
                            <div>
                                <h2 className="text-4xl font-black text-white italic uppercase tracking-tighter">Inventory Audit</h2>
                                <p className="text-slate-500 text-sm font-medium">Real-time AI Quality Control System</p>
                            </div>
                            <button onClick={() => setIsAdding(true)} className="px-8 py-4 bg-white text-slate-950 rounded-2xl font-black text-xs uppercase tracking-widest hover:scale-105 transition-all active:scale-95 shadow-xl shadow-white/5">
                                + New Audit
                            </button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                            {orders.filter(o => activeTab === 'all' || o.qcStatus === activeTab).map(o => (
                                <div key={o.id} className="glass-dark rounded-[2.5rem] p-6 group hover:border-indigo-500/40 transition-all">
                                    <div className="relative aspect-[4/3] rounded-[1.8rem] overflow-hidden bg-slate-900 mb-6">
                                        <img src={o.images[0]} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        <div className="absolute top-4 right-4">
                                            <span className={`status-badge ${o.qcStatus === 'passed' ? 'bg-emerald-500 text-white' : o.qcStatus === 'rejected' ? 'bg-rose-500 text-white' : 'bg-amber-500 text-white'}`}>
                                                {o.qcStatus}
                                            </span>
                                        </div>
                                    </div>
                                    
                                    <h3 className="text-lg font-bold text-white mb-2 truncate">{o.title}</h3>
                                    <p className="text-xs text-slate-500 line-clamp-2 mb-6 font-medium italic">"{o.aiAnalysis}"</p>
                                    
                                    <div className="flex gap-3">
                                        <button onClick={() => setQcModal(o)} className="flex-1 py-3 bg-white/5 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition-all">Report</button>
                                        <button onClick={() => deleteOrder(o.id)} className="w-12 h-12 flex items-center justify-center rounded-xl bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modals */}
                    {isAdding && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-xl">
                            <div className="glass-dark w-full max-w-xl rounded-[3rem] p-10">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase italic italic">Create Audit</h3>
                                    <button onClick={() => { setIsAdding(false); if(cameraActive) toggleCamera(); }}><i data-lucide="x"></i></button>
                                </div>

                                <div className="space-y-6">
                                    {cameraActive ? (
                                        <div className="relative rounded-[2rem] overflow-hidden aspect-video bg-black shadow-2xl">
                                            <video ref={videoRef} className="w-full h-full object-cover" autoPlay playsInline></video>
                                            <button onClick={capture} className="absolute bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-full flex items-center justify-center text-slate-950 shadow-2xl active:scale-90 transition-transform"><i data-lucide="camera"></i></button>
                                        </div>
                                    ) : (
                                        <div className="flex gap-4">
                                            {form.tempImages[0] ? (
                                                <div className="flex-1 aspect-video rounded-[2rem] overflow-hidden relative shadow-2xl">
                                                    <img src={form.tempImages[0]} className="w-full h-full object-cover" />
                                                    <button onClick={() => setForm({...form, tempImages: []})} className="absolute top-4 right-4 bg-black/60 p-3 rounded-full hover:bg-black"><i data-lucide="refresh-cw" className="w-4 h-4 text-white"></i></button>
                                                </div>
                                            ) : (
                                                <button onClick={toggleCamera} className="flex-1 aspect-video bg-indigo-600 rounded-[2rem] flex flex-col items-center justify-center gap-3 hover:bg-indigo-500 transition-all shadow-xl shadow-indigo-500/20 group">
                                                    <div className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center group-hover:scale-110 transition-transform"><i data-lucide="aperture" className="text-white"></i></div>
                                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-white">Start Camera</span>
                                                </button>
                                            )}
                                        </div>
                                    )}
                                    <input placeholder="Job Reference / Batch Name" className="w-full bg-white/5 p-5 rounded-2xl outline-none ring-1 ring-white/10 focus:ring-2 focus:ring-indigo-500 font-bold transition-all" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                                    <button onClick={handleSubmit} disabled={!form.title || isProcessing} className="w-full py-6 ai-shimmer text-white rounded-[1.8rem] font-black uppercase tracking-widest text-xs disabled:opacity-30 shadow-2xl shadow-indigo-500/20">
                                        {isProcessing ? "Analyzing with AI..." : "Push to Audit"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {qcModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-2xl">
                            <div className="glass-dark w-full max-w-5xl h-[85vh] rounded-[3.5rem] overflow-hidden flex flex-col md:flex-row border border-white/10 shadow-3xl">
                                <div className="w-full md:w-1/2 bg-black flex items-center justify-center">
                                    <img src={qcModal.images[0]} className="w-full h-full object-contain" />
                                </div>
                                <div className="flex-1 p-10 flex flex-col overflow-y-auto custom-scrollbar">
                                    <div className="mb-10">
                                        <div className="flex items-center gap-3 mb-4">
                                            <span className="px-3 py-1 bg-indigo-500/20 text-indigo-400 rounded-lg text-[10px] font-black uppercase tracking-widest">Job Report</span>
                                            <span className="text-slate-600 text-[10px] font-bold uppercase">{new Date(qcModal.timestamp).toLocaleDateString()}</span>
                                        </div>
                                        <h2 className="text-3xl font-black uppercase italic text-white leading-none">{qcModal.title}</h2>
                                    </div>

                                    <div className="bg-white/[0.03] p-8 rounded-[2rem] border border-white/5 mb-10 flex-1">
                                        <div className="flex items-center gap-3 mb-6 text-indigo-400">
                                            <div className="w-8 h-8 rounded-full bg-indigo-500/10 flex items-center justify-center"><i data-lucide="cpu" className="w-4 h-4"></i></div>
                                            <span className="text-[11px] font-black uppercase tracking-[0.2em]">Neural Engine Insights</span>
                                        </div>
                                        <p className="text-slate-300 text-sm leading-loose whitespace-pre-line font-medium">{qcModal.aiAnalysis}</p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={() => updateStatus(qcModal.id, 'rejected')} className="py-5 bg-rose-500/10 text-rose-500 rounded-2xl font-black uppercase tracking-widest text-[11px] border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all">Reject Job</button>
                                        <button onClick={() => updateStatus(qcModal.id, 'passed')} className="py-5 bg-emerald-500 text-white rounded-2xl font-black uppercase tracking-widest text-[11px] shadow-xl shadow-emerald-500/20 hover:bg-emerald-400 transition-all">Approve Job</button>
                                    </div>
                                    
                                    <button onClick={() => setQcModal(null)} className="mt-8 text-slate-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition-colors">Exit Audit Mode</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
