<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>WorkSync AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


<!-- ใส่ Firebase Config ตรงนี้ -->
<script>

const __firebase_config = {
 apiKey: "YOUR_API_KEY",
 authDomain: "YOUR_PROJECT.firebaseapp.com",
 projectId: "YOUR_PROJECT",
 storageBucket: "YOUR_PROJECT.appspot.com",
 messagingSenderId: "XXXX",
 appId: "XXXX"
};

</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

window.FB={
initializeApp,getAuth,signInAnonymously,
getFirestore,collection,addDoc,serverTimestamp,
onSnapshot,query,orderBy,
getStorage,ref,uploadBytes,getDownloadURL
}

</script>

</head>


<body class="bg-slate-100">

<div id="root"></div>


<script type="text/babel">

const {useState,useEffect,useRef}=React


/* CAMERA */

function Camera({onCapture,onClose}){

const videoRef=useRef(null)
const canvasRef=useRef(null)
const streamRef=useRef(null)

useEffect(()=>{

async function start(){

try{

const stream=await navigator.mediaDevices.getUserMedia({
 video:{facingMode:"environment"}
})

streamRef.current=stream
videoRef.current.srcObject=stream

}catch{

alert("ไม่สามารถเปิดกล้องได้")

}

}

start()

return ()=>{

if(streamRef.current){
streamRef.current.getTracks().forEach(t=>t.stop())
}

}

},[])


function shoot(){

const video=videoRef.current
const canvas=canvasRef.current

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

const time=new Date().toLocaleString("th-TH")

ctx.fillStyle="white"
ctx.font="30px sans-serif"

ctx.fillText(time,20,canvas.height-40)

canvas.toBlob(blob=>{
onCapture(blob)
},"image/jpeg",0.7)

}

return(

<div className="fixed inset-0 bg-black flex flex-col z-50">

<video ref={videoRef} autoPlay playsInline className="flex-1 object-cover"/>

<div className="p-6 flex justify-center gap-6">

<button onClick={shoot} className="w-16 h-16 bg-white rounded-full"/>

<button onClick={onClose} className="text-white">ปิด</button>

</div>

<canvas ref={canvasRef} className="hidden"/>

</div>

)

}



/* DASHBOARD */

function Dashboard({reports}){

const today=new Date()

const todayReports=reports.filter(r=>{
 if(!r.timestamp?.seconds) return false
 const d=new Date(r.timestamp.seconds*1000)
 return d.toDateString()===today.toDateString()
})

return(

<div className="bg-white p-4 rounded-xl">

<div className="text-sm text-gray-500">
รายงานวันนี้
</div>

<div className="text-3xl font-bold">
{todayReports.length}
</div>

</div>

)

}



/* APP */

function App(){

const [title,setTitle]=useState("")
const [detail,setDetail]=useState("")
const [reports,setReports]=useState([])

const [camera,setCamera]=useState(false)

const [imageBlob,setImageBlob]=useState(null)
const [preview,setPreview]=useState(null)

const db=useRef(null)
const storage=useRef(null)


useEffect(()=>{

async function init(){

const app=FB.initializeApp(__firebase_config)

const auth=FB.getAuth(app)

await FB.signInAnonymously(auth)

storage.current=FB.getStorage(app)

db.current=FB.getFirestore(app)

const q=FB.query(
FB.collection(db.current,'reports'),
FB.orderBy('timestamp','desc')
)

FB.onSnapshot(q,snap=>{

const data=snap.docs.map(d=>({
id:d.id,
...d.data()
}))

setReports(data)

})

}

init()

},[])



function capture(blob){

setImageBlob(blob)

setPreview(URL.createObjectURL(blob))

setCamera(false)

}



async function submit(){

if(!title||!imageBlob){
alert("กรอกหัวข้อและถ่ายรูปก่อน")
return
}

const imgRef=FB.ref(storage.current,'reports/'+Date.now()+'.jpg')

await FB.uploadBytes(imgRef,imageBlob)

const url=await FB.getDownloadURL(imgRef)

await FB.addDoc(
FB.collection(db.current,'reports'),
{
title,
detail,
image:url,
timestamp:FB.serverTimestamp()
}
)

setTitle("")
setDetail("")
setPreview(null)

}



return(

<div className="max-w-md mx-auto p-6 space-y-6">

<h1 className="text-2xl font-bold">
WorkSync AI
</h1>

<Dashboard reports={reports}/>


<div className="bg-white p-4 rounded-xl space-y-3">

<input
className="w-full border p-2 rounded"
placeholder="หัวข้อรายงาน"
value={title}
onChange={e=>setTitle(e.target.value)}
/>

<textarea
className="w-full border p-2 rounded"
placeholder="รายละเอียด"
value={detail}
onChange={e=>setDetail(e.target.value)}
/>


<button
onClick={()=>setCamera(true)}
className="w-full bg-gray-800 text-white p-3 rounded"
>
เปิดกล้อง
</button>

{preview &&

<img src={preview} className="rounded"/>

}

<button
onClick={submit}
className="w-full bg-indigo-600 text-white p-3 rounded"
>
บันทึกรายงาน
</button>

</div>


<div className="space-y-4">

{reports.map(r=>(

<div key={r.id} className="bg-white rounded-xl overflow-hidden">

<img src={r.image}/>

<div className="p-3">

<div className="font-bold">
{r.title}
</div>

<div className="text-sm text-gray-500">
{r.detail}
</div>

</div>

</div>

))}

</div>


{camera &&
<Camera
onCapture={capture}
onClose={()=>setCamera(false)}
/>
}

</div>

)

}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
