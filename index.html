<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync Pro - Optimized Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .preview-overlay { background: rgba(0,0,0,0.9); z-index: 1000; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @media (min-width: 1024px) {
            .app-grid { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; padding: 2rem; max-width: 1400px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isCameraActive, setIsCameraActive] = useState(false);
            const [selectedImg, setSelectedImg] = useState(null);
            const [form, setForm] = useState({ title: '', detail: '', images: [] });
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const dbRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-optimized';

            // ฟังก์ชันย่อขนาดภาพ (สำคัญมากเพื่อแก้ปัญหาที่เจอ)
            const compressImage = (base64Str, maxWidth = 800, maxHeight = 800) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        // ย่อคุณภาพเหลือ 0.6 (60%) เพื่อให้ประหยัดพื้นที่ Firestore
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                });
            };

            useEffect(() => {
                const init = async () => {
                    if (!window.FB) { setTimeout(init, 500); return; }
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FB;
                    const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"AIzaSyDfnz6oOdNuWflcjgr_5cBkrQOCIXcwfHw","authDomain":"myworklog-fd954.firebaseapp.com","projectId":"myworklog-fd954"}');
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    dbRef.current = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    onAuthStateChanged(auth, u => { if(u) setUser(u); });
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, query, onSnapshot, orderBy } = window.FB;
                const q = query(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders'), orderBy('timestamp', 'desc'));
                return onSnapshot(q, s => setOrders(s.docs.map(d => ({id: d.id, ...d.data()}))), (err) => console.error("Firestore Error:", err));
            }, [user]);

            const startCamera = async () => {
                if (form.images.length >= 5) return;
                setIsCameraActive(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (e) { setIsCameraActive(false); }
            };

            const capture = async () => {
                const v = videoRef.current;
                const c = canvasRef.current;
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                const rawImg = c.toDataURL('image/jpeg', 0.9);
                
                // ย่อขนาดก่อนเก็บลง State
                const compressed = await compressImage(rawImg);
                setForm(f => ({...f, images: [...f.images, compressed]}));
                
                if (form.images.length + 1 >= 5) {
                    v.srcObject.getTracks().forEach(t => t.stop());
                    setIsCameraActive(false);
                }
            };

            const save = async () => {
                if (!form.title || form.images.length === 0) return;
                setIsSaving(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.FB;
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders'), { 
                        ...form, 
                        timestamp: serverTimestamp(), 
                        uid: user.uid 
                    });
                    setForm({title: '', detail: '', images: []});
                    setIsAdding(false);
                } catch (e) {
                    alert("บันทึกไม่สำเร็จ: " + e.message);
                } finally {
                    setIsSaving(false);
                }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [user, orders, isAdding, isCameraActive, form.images]);

            return (
                <div className="min-h-screen bg-slate-50">
                    <div className="app-grid">
                        {/* Sidebar */}
                        <aside className="hidden lg:block">
                            <div className="glass p-8 rounded-[2.5rem] sticky top-8 shadow-sm">
                                <div className="flex items-center gap-3 mb-10">
                                    <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                        <i data-lucide="shield-check"></i>
                                    </div>
                                    <h1 className="font-black text-slate-900 tracking-tight">WORKSYNC</h1>
                                </div>
                                <button onClick={() => setIsAdding(true)} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all mb-4">
                                    สร้างออเดอร์ใหม่
                                </button>
                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase">Total Orders</p>
                                    <p className="text-2xl font-black text-slate-800">{orders.length}</p>
                                </div>
                            </div>
                        </aside>

                        {/* Mobile Header */}
                        <header className="lg:hidden p-6 bg-white border-b flex justify-between items-center">
                            <h1 className="font-black text-slate-900">WORKSYNC</h1>
                            <button onClick={() => setIsAdding(true)} className="p-2 bg-indigo-600 text-white rounded-full">
                                <i data-lucide="plus"></i>
                            </button>
                        </header>

                        {/* Order List */}
                        <main className="p-4 lg:p-0 space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {orders.map(o => (
                                    <div key={o.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 group">
                                        <div className="flex justify-between items-start mb-4">
                                            <h3 className="font-black text-slate-900 text-lg">{o.title}</h3>
                                            <span className="text-[10px] font-bold text-slate-400">
                                                {o.timestamp ? new Date(o.timestamp.seconds*1000).toLocaleDateString('th-TH') : '...'}
                                            </span>
                                        </div>
                                        <p className="text-sm text-slate-500 mb-6 line-clamp-2">{o.detail || 'ไม่มีรายละเอียด'}</p>
                                        
                                        <div className="grid grid-cols-5 gap-2">
                                            {o.images.map((img, i) => (
                                                <div key={i} className="aspect-square rounded-xl overflow-hidden cursor-pointer hover:opacity-80 transition-opacity" onClick={() => setSelectedImg(img)}>
                                                    <img src={img} className="w-full h-full object-cover" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>

                    {/* Modal Add Order */}
                    {isAdding && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md flex items-end lg:items-center justify-center p-0 lg:p-6">
                            <div className="bg-white w-full lg:max-w-xl rounded-t-[3rem] lg:rounded-[3rem] p-8 lg:p-10 max-h-[95vh] overflow-y-auto hide-scrollbar">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black text-slate-900">บันทึกข้อมูล Order</h2>
                                    <button onClick={() => { setIsAdding(false); if(videoRef.current?.srcObject) videoRef.current.srcObject.getTracks().forEach(t=>t.stop()); setIsCameraActive(false); }} className="p-2">
                                        <i data-lucide="x" className="w-6 h-6 text-slate-300"></i>
                                    </button>
                                </div>

                                <div className="space-y-6">
                                    {/* Camera Area */}
                                    <div className="aspect-video bg-slate-950 rounded-[2rem] overflow-hidden relative">
                                        {isCameraActive ? (
                                            <>
                                                <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                                <button onClick={capture} className="absolute bottom-4 left-1/2 -translate-x-1/2 w-14 h-14 bg-white rounded-full flex items-center justify-center border-4 border-slate-900 active:scale-90 transition-transform">
                                                    <div className="w-8 h-8 bg-slate-900 rounded-full"></div>
                                                </button>
                                            </>
                                        ) : (
                                            <div className="w-full h-full flex flex-col items-center justify-center gap-4 text-slate-500">
                                                {form.images.length < 5 ? (
                                                    <button onClick={startCamera} className="px-6 py-3 bg-white text-indigo-600 rounded-2xl font-bold shadow-xl flex items-center gap-2">
                                                        <i data-lucide="camera"></i> ถ่ายภาพ ({form.images.length}/5)
                                                    </button>
                                                ) : <p className="text-white font-bold">ถ่ายครบ 5 รูปแล้ว</p>}
                                            </div>
                                        )}
                                    </div>

                                    {/* Image Strip */}
                                    <div className="flex gap-2 overflow-x-auto pb-2">
                                        {form.images.map((img, i) => (
                                            <div key={i} className="w-20 h-20 rounded-xl overflow-hidden relative flex-shrink-0 group">
                                                <img src={img} className="w-full h-full object-cover" />
                                                <button onClick={() => setForm(f => ({...f, images: f.images.filter((_, idx) => idx !== i)}))} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <i data-lucide="trash-2" className="w-3 h-3"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="space-y-4">
                                        <input placeholder="ชื่อลูกค้า / เลข Order" className="w-full p-5 bg-slate-50 rounded-2xl font-bold border-none outline-none focus:ring-2 ring-indigo-100" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} />
                                        <textarea placeholder="รายละเอียด..." className="w-full p-5 bg-slate-50 rounded-2xl min-h-[100px] border-none outline-none focus:ring-2 ring-indigo-100" value={form.detail} onChange={e=>setForm({...form, detail: e.target.value})}></textarea>
                                    </div>

                                    <button onClick={save} disabled={!form.title || form.images.length === 0 || isSaving} className="w-full py-6 bg-indigo-600 text-white rounded-3xl font-black uppercase tracking-widest text-sm shadow-xl shadow-indigo-100 disabled:opacity-30">
                                        {isSaving ? 'กำลังบันทึก...' : 'บันทึกออเดอร์'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Lightbox Preview */}
                    {selectedImg && (
                        <div className="fixed inset-0 preview-overlay flex items-center justify-center p-4" onClick={() => setSelectedImg(null)}>
                            <img src={selectedImg} className="max-w-full max-h-[80vh] object-contain rounded-2xl shadow-2xl" />
                            <div className="absolute bottom-10 text-white/50 font-bold uppercase tracking-[0.3em] text-[10px]">WorkSync Image Viewer</div>
                        </div>
                    )}

                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
