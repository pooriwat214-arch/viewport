<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync AI - Smart Reporting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .app-card { max-width: 500px; margin: 0 auto; min-height: 100vh; background: white; position: relative; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ลงทะเบียน Firebase เข้าสู่ Global scope เพื่อให้ React เรียกใช้ได้ทันที
        window.FirebaseBridge = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            signInWithCustomToken, getFirestore, collection, addDoc, 
            onSnapshot, query, serverTimestamp, orderBy 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [reports, setReports] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [status, setStatus] = useState('initializing'); // initializing, connecting, ready, error
            const [form, setForm] = useState({ title: '', detail: '', image: null });
            const [aiProcessing, setAiProcessing] = useState(false);
            const dbRef = useRef(null);
            const authRef = useRef(null);

            // 1. ตรวจสอบการโหลด Library และเชื่อมต่อ Auth
            useEffect(() => {
                const checkAndInit = async () => {
                    if (!window.FirebaseBridge) {
                        setTimeout(checkAndInit, 500);
                        return;
                    }
                    
                    setStatus('connecting');
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore } = window.FirebaseBridge;
                    
                    try {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        
                        authRef.current = auth;
                        dbRef.current = db;

                        // ล็อกอินแบบข้ามขั้นตอนถ้ามี Token หรือล็อกอินแบบ Anonymous
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setStatus('ready');
                            } else {
                                setStatus('error');
                            }
                        });
                    } catch (err) {
                        console.error("Firebase Auth Error:", err);
                        setStatus('error');
                    }
                };

                checkAndInit();
            }, []);

            // 2. ดึงข้อมูลรายงานจาก Cloud
            useEffect(() => {
                if (status !== 'ready' || !user || !dbRef.current) return;

                const { collection, query, onSnapshot, orderBy } = window.FirebaseBridge;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                
                const q = query(
                    collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'work_reports'),
                    orderBy('timestamp', 'desc')
                );

                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setReports(data);
                }, (err) => {
                    console.error("Firestore Listen Error:", err);
                });

                return () => unsubscribe();
            }, [status, user]);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setForm({...form, image: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            const submitReport = async () => {
                if (!form.title || !form.image) return;
                const { collection, addDoc, serverTimestamp } = window.FirebaseBridge;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                
                try {
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'work_reports'), {
                        ...form,
                        userId: user.uid,
                        timestamp: serverTimestamp()
                    });
                    setForm({ title: '', detail: '', image: null });
                    setIsAdding(false);
                } catch (err) {
                    alert("บันทึกไม่สำเร็จ: " + err.message);
                }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [status, reports, isAdding]);

            if (status === 'initializing' || status === 'connecting') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-white">
                        <div className="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin"></div>
                        <p className="mt-6 font-bold text-slate-400 text-xs tracking-widest uppercase">กำลังเชื่อมต่อคลาวด์...</p>
                    </div>
                );
            }

            if (status === 'error') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-red-50 p-8 text-center">
                        <i data-lucide="alert-triangle" className="w-16 h-16 text-red-500 mb-6"></i>
                        <h1 className="text-xl font-black text-red-900 mb-2">เชื่อมต่อล้มเหลว</h1>
                        <p className="text-red-700 text-sm mb-8">โปรดตรวจสอบว่าได้ตั้งค่า Firebase Rules และ Anonymous Auth ในโปรเจกต์ 'MyWorkLog' แล้ว</p>
                        <button onClick={() => window.location.reload()} className="px-10 py-4 bg-red-600 text-white rounded-2xl font-bold uppercase tracking-widest text-xs">ลองอีกครั้ง</button>
                    </div>
                );
            }

            return (
                <div className="app-card">
                    {/* Header */}
                    <header className="px-6 py-6 border-b border-slate-100 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center text-white">
                                <i data-lucide="zap" className="w-5 h-5 fill-current"></i>
                            </div>
                            <h1 className="text-xl font-black text-slate-900 italic tracking-tighter">WORK<span className="text-indigo-600">SYNC</span></h1>
                        </div>
                        <div className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Online</div>
                    </header>

                    {/* Timeline */}
                    <main className="p-6 pb-32 space-y-8">
                        {reports.length === 0 ? (
                            <div className="py-20 text-center">
                                <div className="w-16 h-16 bg-slate-50 rounded-3xl flex items-center justify-center mx-auto mb-4 text-slate-200">
                                    <i data-lucide="image" className="w-8 h-8"></i>
                                </div>
                                <p className="text-slate-400 text-sm font-medium">ยังไม่มีข้อมูลในคลาวด์</p>
                            </div>
                        ) : (
                            reports.map(item => (
                                <div key={item.id} className="animate-pop bg-white border border-slate-100 rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500">
                                    <img src={item.image} className="w-full h-56 object-cover" />
                                    <div className="p-6">
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="font-bold text-slate-900">{item.title}</h3>
                                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">
                                                {item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleTimeString('th-TH') : '...'}
                                            </span>
                                        </div>
                                        <p className="text-sm text-slate-500 leading-relaxed">{item.detail}</p>
                                    </div>
                                </div>
                            ))
                        )}
                    </main>

                    {/* Add Button */}
                    <div className="fixed bottom-8 left-0 right-0 px-6 flex justify-center z-50">
                        <button 
                            onClick={() => setIsAdding(true)}
                            className="bg-slate-900 text-white px-8 py-5 rounded-full shadow-2xl flex items-center gap-3 font-bold text-sm uppercase tracking-[0.2em] active:scale-95 transition-transform"
                        >
                            <i data-lucide="plus-circle" className="w-5 h-5"></i>
                            New Report
                        </button>
                    </div>

                    {/* Modal */}
                    {isAdding && (
                        <div className="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-lg rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl animate-pop max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black text-slate-900 uppercase tracking-tight">เพิ่มบันทึกใหม่</h2>
                                    <button onClick={() => setIsAdding(false)} className="bg-slate-100 p-2 rounded-full"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                
                                <div className="space-y-6">
                                    <div className="aspect-video bg-slate-50 rounded-[2rem] border-4 border-dashed border-slate-100 flex items-center justify-center overflow-hidden">
                                        {form.image ? (
                                            <img src={form.image} className="w-full h-full object-cover" />
                                        ) : (
                                            <label className="cursor-pointer flex flex-col items-center">
                                                <i data-lucide="camera" className="w-10 h-10 text-slate-200 mb-2"></i>
                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">อัปโหลดรูปภาพ</span>
                                                <input type="file" accept="image/*" className="hidden" onChange={handleImage} />
                                            </label>
                                        )}
                                    </div>

                                    <div className="space-y-4">
                                        <input 
                                            placeholder="หัวข้อรายงาน"
                                            className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-slate-900 focus:bg-white border-2 border-transparent focus:border-indigo-100"
                                            value={form.title}
                                            onChange={e => setForm({...form, title: e.target.value})}
                                        />
                                        <textarea 
                                            placeholder="รายละเอียด..."
                                            className="w-full p-5 bg-slate-50 rounded-2xl outline-none text-slate-600 min-h-[120px] focus:bg-white border-2 border-transparent focus:border-indigo-100"
                                            value={form.detail}
                                            onChange={e => setForm({...form, detail: e.target.value})}
                                        ></textarea>
                                    </div>

                                    <button 
                                        onClick={submitReport}
                                        disabled={!form.title || !form.image}
                                        className="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-black uppercase tracking-widest text-xs disabled:opacity-20 shadow-xl"
                                    >
                                        บันทึกลง Cloud
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
