<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync AI - Smart Reporting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .app-card { max-width: 500px; margin: 0 auto; min-height: 100vh; background: white; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.02); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .btn-primary { background: #4f46e5; transition: all 0.3s ease; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseBridge = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            signInWithCustomToken, getFirestore, collection, doc, addDoc, 
            onSnapshot, query, serverTimestamp, orderBy 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [reports, setReports] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [status, setStatus] = useState('initializing');
            const [form, setForm] = useState({ title: '', detail: '', image: null });
            const dbRef = useRef(null);
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'myworklog-fd954-app';

            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.FirebaseBridge) {
                        setTimeout(initFirebase, 500);
                        return;
                    }

                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseBridge;

                    try {
                        const config = {
                            apiKey: "AIzaSyDfnz6oOdNuWflcjgr_5cBkrQOCIXcwfHw",
                            authDomain: "myworklog-fd954.firebaseapp.com",
                            projectId: "myworklog-fd954",
                            storageBucket: "myworklog-fd954.firebasestorage.app",
                            messagingSenderId: "368228283488",
                            appId: "1:368228283488:web:b5f7129a67315a6aefff05",
                            measurementId: "G-VJRPS5NP3D"
                        };

                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        dbRef.current = getFirestore(app);

                        // ฟังก์ชันสำหรับจัดการ Sign In แบบปลอดภัย
                        const performSignIn = async () => {
                            try {
                                // ตรวจสอบ Custom Token ก่อน
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    try {
                                        await signInWithCustomToken(auth, __initial_auth_token);
                                        return;
                                    } catch (tokenErr) {
                                        // หาก Token มีปัญหา (เช่น Mismatch) ให้ถอยไปใช้ Anonymous
                                        console.warn("Custom Token failed, falling back to Anonymous:", tokenErr.message);
                                    }
                                }
                                await signInAnonymously(auth);
                            } catch (signInErr) {
                                throw signInErr;
                            }
                        };

                        await performSignIn();

                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                setStatus('ready');
                            }
                        });
                    } catch (err) {
                        console.error("Firebase Initialization Error:", err);
                        setStatus('error');
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (status !== 'ready' || !user || !dbRef.current) return;

                const { collection, query, onSnapshot, orderBy } = window.FirebaseBridge;
                const reportsRef = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'reports');
                const q = query(reportsRef, orderBy('timestamp', 'desc'));

                const unsubscribe = onSnapshot(q, 
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setReports(data);
                    }, 
                    (err) => {
                        console.error("Firestore Listen Error:", err);
                    }
                );

                return () => unsubscribe();
            }, [status, user]);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setForm({...form, image: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            const saveReport = async () => {
                if (!form.title || !form.image || !user || isSaving) return;
                
                setIsSaving(true);
                const { collection, addDoc, serverTimestamp } = window.FirebaseBridge;
                
                try {
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'reports'), {
                        ...form,
                        creatorId: user.uid,
                        timestamp: serverTimestamp()
                    });
                    setForm({ title: '', detail: '', image: null });
                    setIsAdding(false);
                } catch (err) {
                    alert("บันทึกไม่สำเร็จ: " + err.message);
                } finally {
                    setIsSaving(false);
                }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [status, reports, isAdding, isSaving]);

            if (status === 'initializing') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-white">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                        <p className="mt-4 font-bold text-slate-400 text-xs tracking-widest uppercase animate-pulse">กำลังตั้งค่าระบบ Cloud...</p>
                    </div>
                );
            }

            if (status === 'error') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-50 p-10 text-center">
                        <i data-lucide="alert-circle" className="w-12 h-12 text-red-500 mb-4"></i>
                        <h2 className="text-lg font-bold text-slate-800 uppercase">Cloud Error</h2>
                        <p className="text-slate-500 text-sm mt-2">โปรดเปิดใช้งาน Anonymous Auth ใน Firebase Console</p>
                    </div>
                );
            }

            return (
                <div className="app-card pb-32">
                    <header className="px-6 py-6 border-b border-slate-50 glass-nav sticky top-0 z-40 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                <i data-lucide="check-square" className="w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-900 leading-none tracking-tighter uppercase">My<span className="text-indigo-600">WorkLog</span></h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Status: {user ? 'Connected' : 'Connecting'}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 bg-green-50 px-3 py-1.5 rounded-full border border-green-100">
                            <span className="text-[10px] font-black text-green-700 uppercase">Online</span>
                        </div>
                    </header>

                    <main className="p-6 space-y-8">
                        {reports.length === 0 ? (
                            <div className="py-24 text-center">
                                <div className="w-20 h-20 bg-slate-50 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-slate-200 border border-slate-50">
                                    <i data-lucide="plus-square" className="w-8 h-8"></i>
                                </div>
                                <h3 className="text-slate-800 font-bold">ยังไม่พบบันทึก</h3>
                                <p className="text-slate-400 text-xs mt-2">กดปุ่มด้านล่างเพื่อเริ่มบันทึกงานครั้งแรก</p>
                            </div>
                        ) : (
                            reports.map(report => (
                                <div key={report.id} className="animate-pop bg-white border border-slate-100 rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-md transition-all">
                                    <div className="relative">
                                        <img src={report.image} className="w-full h-64 object-cover" />
                                        <div className="absolute top-4 right-4 bg-black/40 backdrop-blur-md px-3 py-1 rounded-full text-[10px] text-white font-bold">
                                            {report.timestamp ? new Date(report.timestamp.seconds * 1000).toLocaleTimeString('th-TH') : 'Syncing...'}
                                        </div>
                                    </div>
                                    <div className="p-7">
                                        <h3 className="text-lg font-black text-slate-900 mb-2">{report.title}</h3>
                                        <p className="text-slate-500 text-sm leading-relaxed mb-4">{report.detail}</p>
                                        <div className="pt-4 border-t border-slate-50 flex items-center gap-2">
                                            <div className="w-5 h-5 bg-slate-100 rounded-full flex items-center justify-center">
                                                <i data-lucide="user" className="w-2.5 h-2.5 text-slate-400"></i>
                                            </div>
                                            <span className="text-[9px] font-bold text-slate-300 uppercase tracking-widest">User ID: {report.creatorId?.substring(0, 10)}</span>
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </main>

                    <div className="fixed bottom-8 left-0 right-0 px-6 flex justify-center z-50 pointer-events-none">
                        <button 
                            onClick={() => setIsAdding(true)}
                            className="pointer-events-auto btn-primary text-white px-10 py-5 rounded-full shadow-2xl flex items-center gap-4 font-black text-xs uppercase tracking-[0.2em]"
                        >
                            <i data-lucide="plus" className="w-5 h-5"></i>
                            Add WorkLog
                        </button>
                    </div>

                    {isAdding && (
                        <div className="fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl animate-pop max-h-[92vh] overflow-y-auto hide-scrollbar">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black text-slate-900 tracking-tighter uppercase">บันทึกข้อมูล</h2>
                                    <button onClick={() => setIsAdding(false)} className="bg-slate-50 p-2.5 rounded-full text-slate-400">
                                        <i data-lucide="x" className="w-6 h-6"></i>
                                    </button>
                                </div>

                                <div className="space-y-6">
                                    <div className="aspect-video bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200 flex items-center justify-center relative overflow-hidden group">
                                        {form.image ? (
                                            <div className="relative w-full h-full">
                                                <img src={form.image} className="w-full h-full object-cover" />
                                                <button onClick={() => setForm({...form, image: null})} className="absolute top-4 right-4 bg-white p-2 rounded-full shadow-lg">
                                                    <i data-lucide="trash-2" className="w-4 h-4 text-red-500"></i>
                                                </button>
                                            </div>
                                        ) : (
                                            <label className="cursor-pointer flex flex-col items-center">
                                                <i data-lucide="camera" className="w-10 h-10 text-slate-200 mb-2"></i>
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">เลือกรูปภาพ</span>
                                                <input type="file" accept="image/*" className="hidden" onChange={handleImage} />
                                            </label>
                                        )}
                                    </div>

                                    <div className="space-y-4">
                                        <input 
                                            placeholder="หัวข้องานที่ทำวันนี้"
                                            className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-slate-900 border-2 border-transparent focus:border-indigo-100 transition-all"
                                            value={form.title}
                                            onChange={e => setForm({...form, title: e.target.value})}
                                        />
                                        <textarea 
                                            placeholder="สรุปรายละเอียด..."
                                            className="w-full p-5 bg-slate-50 rounded-2xl outline-none text-slate-600 min-h-[120px] border-2 border-transparent focus:border-indigo-100 transition-all"
                                            value={form.detail}
                                            onChange={e => setForm({...form, detail: e.target.value})}
                                        ></textarea>
                                    </div>

                                    <button 
                                        onClick={saveReport}
                                        disabled={!form.title || !form.image || isSaving}
                                        className="w-full py-6 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase tracking-widest text-xs shadow-xl disabled:opacity-30 active:scale-95 transition-all flex items-center justify-center gap-3"
                                    >
                                        {isSaving ? 'กำลังอัปโหลด...' : 'บันทึกงาน'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
