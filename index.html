<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync Pro - Order Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #0f172a; overflow-x: hidden; }
        
        @media (min-width: 1024px) {
            .desktop-layout { display: grid; grid-template-columns: 320px 1fr; gap: 2rem; padding: 2rem; max-width: 1600px; margin: 0 auto; }
            .sidebar-fixed { position: sticky; top: 2rem; height: calc(100vh - 4rem); }
        }

        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; }
        .preview-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [reports, setReports] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isCameraActive, setIsCameraActive] = useState(false);
            const [status, setStatus] = useState('loading');
            const [selectedImage, setSelectedImage] = useState(null);
            
            // Multi-image state
            const [form, setForm] = useState({ title: '', detail: '', images: [] });
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const dbRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-pro-v2';

            useEffect(() => {
                const init = async () => {
                    if (!window.FB) { setTimeout(init, 500); return; }
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FB;
                    const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"AIzaSyDfnz6oOdNuWflcjgr_5cBkrQOCIXcwfHw","authDomain":"myworklog-fd954.firebaseapp.com","projectId":"myworklog-fd954"}');
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    dbRef.current = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    onAuthStateChanged(auth, u => { if(u) { setUser(u); setStatus('ready'); }});
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, query, onSnapshot, orderBy } = window.FB;
                const q = query(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders'), orderBy('timestamp', 'desc'));
                return onSnapshot(q, s => setReports(s.docs.map(d => ({id: d.id, ...d.data()}))));
            }, [user]);

            const startCamera = async () => {
                if (form.images.length >= 5) {
                    alert("บันทึกได้สูงสุด 5 รูปต่อหนึ่งรายการ");
                    return;
                }
                setIsCameraActive(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
                    });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (e) { setIsCameraActive(false); }
            };

            const capture = () => {
                const v = videoRef.current;
                const c = canvasRef.current;
                c.width = v.videoWidth; c.height = v.videoHeight;
                const ctx = c.getContext('2d');
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(v, 0, 0);
                const img = c.toDataURL('image/jpeg', 0.9);
                
                setForm(f => ({...f, images: [...f.images, img]}));
                
                // ถ่ายต่อได้เลยถ้ายังไม่ครบ 5 รูป หรือจะปิดกล้องก็ได้
                if (form.images.length + 1 >= 5) {
                    v.srcObject.getTracks().forEach(t => t.stop());
                    setIsCameraActive(false);
                }
            };

            const stopCamera = () => {
                if(videoRef.current?.srcObject) videoRef.current.srcObject.getTracks().forEach(t=>t.stop());
                setIsCameraActive(false);
            };

            const removeImage = (index) => {
                setForm(f => ({...f, images: f.images.filter((_, i) => i !== index)}));
            };

            const save = async () => {
                if (!form.title || form.images.length === 0) return;
                setIsSaving(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.FB;
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders'), { 
                        ...form, 
                        timestamp: serverTimestamp(), 
                        uid: user.uid,
                        imageCount: form.images.length
                    });
                    setForm({title: '', detail: '', images: []});
                    setIsAdding(false);
                } catch (e) {
                    alert("เกิดข้อผิดพลาดในการบันทึก");
                } finally {
                    setIsSaving(false);
                }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [status, reports, isAdding, isCameraActive, form.images]);

            if (status === 'loading') return (
                <div className="h-screen flex items-center justify-center bg-slate-50">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                        <span className="font-bold text-slate-400 text-xs tracking-[0.2em] uppercase">WorkSync Pro Loading</span>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen desktop-layout">
                    {/* SIDEBAR */}
                    <aside className="sidebar-fixed flex flex-col gap-6">
                        <div className="glass p-8 rounded-[2.5rem] card-shadow">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                    <i data-lucide="package" className="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-900 tracking-tighter">WORKSYNC <span className="text-indigo-600">PRO</span></h1>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Order Management</p>
                                </div>
                            </div>

                            <button 
                                onClick={() => setIsAdding(true)}
                                className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold flex items-center justify-center gap-3 transition-all shadow-xl shadow-indigo-100 mb-6 group"
                            >
                                <i data-lucide="plus" className="w-5 h-5 group-hover:rotate-90 transition-transform"></i>
                                สร้างรายการใหม่
                            </button>

                            <div className="space-y-3">
                                <div className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <span className="text-xs font-bold text-slate-500 uppercase">ทั้งหมด</span>
                                    <span className="text-lg font-black text-indigo-600">{reports.length}</span>
                                </div>
                                <div className="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100">
                                    <p className="text-[10px] font-black text-indigo-400 uppercase mb-1 text-center">Cloud Storage Active</p>
                                </div>
                            </div>
                        </div>

                        <div className="mt-auto p-6 bg-white/50 rounded-3xl border border-dashed border-slate-200 text-center">
                            <p className="text-[10px] font-bold text-slate-300 uppercase">User Access</p>
                            <p className="text-xs text-slate-400 font-medium truncate">{user?.uid}</p>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="space-y-6">
                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                            {reports.map(report => (
                                <div key={report.id} className="animate-in glass rounded-[2.5rem] overflow-hidden card-shadow group hover:border-indigo-200 transition-colors">
                                    <div className="p-8">
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <h3 className="text-xl font-black text-slate-900 mb-1">{report.title}</h3>
                                                <p className="text-sm text-slate-500 leading-relaxed">{report.detail}</p>
                                            </div>
                                            <div className="text-right">
                                                <div className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-black uppercase mb-1">
                                                    Order Active
                                                </div>
                                                <p className="text-[10px] font-bold text-slate-300">
                                                    {report.timestamp ? new Date(report.timestamp.seconds*1000).toLocaleString('th-TH') : '...'}
                                                </p>
                                            </div>
                                        </div>

                                        {/* Image Gallery */}
                                        <div className="grid grid-cols-5 gap-3">
                                            {report.images.map((img, idx) => (
                                                <div 
                                                    key={idx} 
                                                    className="aspect-square rounded-2xl overflow-hidden cursor-zoom-in hover:ring-4 ring-indigo-100 transition-all group/img relative"
                                                    onClick={() => setSelectedImage(img)}
                                                >
                                                    <img src={img} className="w-full h-full object-cover transition-transform group-hover/img:scale-110" loading="lazy" />
                                                    <div className="absolute inset-0 bg-black/20 opacity-0 group-hover/img:opacity-100 transition-opacity flex items-center justify-center">
                                                        <i data-lucide="maximize-2" className="w-4 h-4 text-white"></i>
                                                    </div>
                                                </div>
                                            ))}
                                            {/* Placeholders if less than 5 */}
                                            {[...Array(Math.max(0, 5 - report.images.length))].map((_, i) => (
                                                <div key={i} className="aspect-square rounded-2xl bg-slate-50 border border-dashed border-slate-200 flex items-center justify-center text-slate-200">
                                                    <i data-lucide="image" className="w-4 h-4"></i>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {reports.length === 0 && (
                            <div className="py-40 text-center glass rounded-[3rem] border-dashed">
                                <i data-lucide="inbox" className="w-16 h-16 text-slate-200 mx-auto mb-4"></i>
                                <h3 className="text-slate-400 font-bold uppercase tracking-widest">No Active Orders</h3>
                            </div>
                        )}
                    </main>

                    {/* MODAL: ADD ORDER */}
                    {isAdding && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-xl flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl animate-in max-h-[90vh] overflow-y-auto hide-scrollbar">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black text-slate-900 tracking-tight">เพิ่มรายการใหม่ (Order)</h2>
                                    <button onClick={() => { setIsAdding(false); stopCamera(); }} className="p-3 bg-slate-50 text-slate-400 rounded-full hover:text-slate-600">
                                        <i data-lucide="x" className="w-6 h-6"></i>
                                    </button>
                                </div>

                                <div className="space-y-8">
                                    {/* Multi-Camera Section */}
                                    <div className="space-y-4">
                                        <div className="aspect-video bg-slate-950 rounded-[2.5rem] overflow-hidden relative border-4 border-slate-100">
                                            {isCameraActive ? (
                                                <>
                                                    <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                                    <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black/50 text-white px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">
                                                        Live View ({form.images.length}/5)
                                                    </div>
                                                    <button 
                                                        onClick={capture} 
                                                        className="absolute bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-2xl active:scale-90"
                                                    >
                                                        <div className="w-12 h-12 border-4 border-slate-900 rounded-full"></div>
                                                    </button>
                                                </>
                                            ) : (
                                                <div className="w-full h-full flex flex-col items-center justify-center gap-4 bg-slate-50">
                                                    <button onClick={startCamera} className="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold flex items-center gap-2 shadow-lg">
                                                        <i data-lucide="camera" className="w-5 h-5"></i> เปิดกล้องถ่ายภาพ
                                                    </button>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase">หรือเลือกจากคลังภาพด้านล่าง</p>
                                                </div>
                                            )}
                                        </div>

                                        {/* Captured Preview Strip */}
                                        <div className="flex gap-3 overflow-x-auto py-2 px-1">
                                            {form.images.map((img, i) => (
                                                <div key={i} className="w-24 h-24 rounded-2xl overflow-hidden relative flex-shrink-0 group">
                                                    <img src={img} className="w-full h-full object-cover" />
                                                    <button 
                                                        onClick={() => removeImage(i)}
                                                        className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg"
                                                    >
                                                        <i data-lucide="trash-2" className="w-3 h-3"></i>
                                                    </button>
                                                    <div className="absolute bottom-1 left-1 bg-black/40 text-[8px] px-1.5 rounded text-white font-bold">{i+1}</div>
                                                </div>
                                            ))}
                                            {form.images.length < 5 && !isCameraActive && (
                                                <label className="w-24 h-24 rounded-2xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 flex-shrink-0 transition-colors">
                                                    <i data-lucide="image-plus" className="w-6 h-6 text-slate-300"></i>
                                                    <input type="file" multiple accept="image/*" className="hidden" onChange={e => {
                                                        Array.from(e.target.files).forEach(file => {
                                                            const r = new FileReader();
                                                            r.onload = () => setForm(f => ({...f, images: [...f.images, r.result].slice(0, 5)}));
                                                            r.readAsDataURL(file);
                                                        });
                                                    }} />
                                                </label>
                                            )}
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <input 
                                            placeholder="ชื่อลูกค้า / เลขที่ Order"
                                            className="w-full p-6 bg-slate-50 rounded-3xl font-bold text-lg outline-none focus:ring-4 ring-indigo-50 border-none transition-all"
                                            value={form.title}
                                            onChange={e => setForm({...form, title: e.target.value})}
                                        />
                                        <textarea 
                                            placeholder="บันทึกรายละเอียดงาน..."
                                            className="w-full p-6 bg-slate-50 rounded-3xl min-h-[120px] outline-none focus:ring-4 ring-indigo-50 border-none transition-all"
                                            value={form.detail}
                                            onChange={e => setForm({...form, detail: e.target.value})}
                                        ></textarea>
                                    </div>

                                    <div className="flex gap-4 pt-4">
                                        <button 
                                            onClick={save}
                                            disabled={!form.title || form.images.length === 0 || isSaving}
                                            className="flex-1 py-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[2rem] font-black uppercase tracking-widest text-sm shadow-xl shadow-indigo-100 disabled:opacity-20 transition-all"
                                        >
                                            {isSaving ? 'กำลังบันทึกข้อมูล...' : 'ยืนยันสร้างรายการ'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LIGHTBOX: PREVIEW IMAGE */}
                    {selectedImage && (
                        <div className="fixed inset-0 z-[200] preview-overlay flex flex-col animate-in" onClick={() => setSelectedImage(null)}>
                            <div className="flex justify-end p-8">
                                <button className="text-white bg-white/10 hover:bg-white/20 p-4 rounded-full backdrop-blur-md">
                                    <i data-lucide="x" className="w-8 h-8"></i>
                                </button>
                            </div>
                            <div className="flex-1 flex items-center justify-center p-4">
                                <img 
                                    src={selectedImage} 
                                    className="max-w-full max-h-full object-contain rounded-3xl shadow-2xl shadow-black/50" 
                                    onClick={e => e.stopPropagation()} 
                                />
                            </div>
                            <div className="p-10 text-center">
                                <p className="text-white/60 font-bold tracking-widest text-xs uppercase">WorkSync Pro Image Viewer</p>
                            </div>
                        </div>
                    )}

                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
