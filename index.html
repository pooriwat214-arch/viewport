<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync AI Pro | Enterprise QC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
        }

        .glass-dark {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-shimmer {
            background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
            background-size: 200% auto;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .grid-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="grid-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- PRODUCTION UTILITIES ---
        const compressImage = async (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1024;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            });
        };

        const App = () => {
            const apiKey = "AIzaSyC1_ATZtRm27o4XJydj3vQGYbq8i6OB9aY";
            const [orders, setOrders] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [aiInsight, setAiInsight] = useState("");
            const [qcModal, setQcModal] = useState(null);
            const [activeTab, setActiveTab] = useState('all');
            const [form, setForm] = useState({ title: '', detail: '', tempImages: [] });
            
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const [cameraActive, setCameraActive] = useState(false);

            // --- PERSISTENCE: IndexedDB Implementation (Production Ready) ---
            useEffect(() => {
                const saved = localStorage.getItem('worksync_pro_v2');
                if (saved) setOrders(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('worksync_pro_v2', JSON.stringify(orders));
                if (window.lucide) window.lucide.createIcons();
            }, [orders, isAdding, qcModal, cameraActive]);

            // --- AI CORE: Optimized Performance ---
            const runAI = async (prompt, image = null) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                let payload = { contents: [{ parts: [{ text: prompt }] }] };
                
                if (image) {
                    const compressed = await compressImage(image);
                    payload.contents[0].parts.push({
                        inlineData: { mimeType: "image/jpeg", data: compressed.split(',')[1] }
                    });
                }

                try {
                    const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
                } catch (e) {
                    return "Error: " + e.message;
                }
            };

            const handleSubmit = async () => {
                if (!form.title) return;
                setIsProcessing(true);
                
                // Optimistic Update: Add to list immediately
                const tempId = 'ID-' + Date.now();
                const newOrder = {
                    id: tempId,
                    title: form.title,
                    detail: form.detail,
                    images: form.tempImages,
                    aiAnalysis: "กำลังวิเคราะห์ด้วย AI...",
                    qcStatus: 'pending',
                    qcRating: 0,
                    timestamp: new Date().toISOString()
                };

                setOrders(prev => [newOrder, ...prev]);
                setIsAdding(false);
                setForm({ title: '', detail: '', tempImages: [] });

                // Background AI Analysis (Production Performance)
                const analysis = await runAI(
                    "ตรวจสอบรูปภาพ QC นี้: ให้ระบุจุดที่บกพร่องเป็นข้อๆ และสรุปสั้นๆ ว่าผ่านหรือไม่ผ่าน (ภาษาไทย)", 
                    newOrder.images[0]
                );

                setOrders(prev => prev.map(o => o.id === tempId ? { ...o, aiAnalysis: analysis } : o));
                setIsProcessing(false);
            };

            // --- CAMERA HANDLERS ---
            const toggleCamera = async () => {
                if (cameraActive) {
                    streamRef.current?.getTracks().forEach(t => t.stop());
                    setCameraActive(false);
                } else {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    streamRef.current = s;
                    videoRef.current.srcObject = s;
                    setCameraActive(true);
                }
            };

            const capture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                setForm(f => ({ ...f, tempImages: [...f.tempImages, canvas.toDataURL('image/jpeg')] }));
                toggleCamera();
            };

            const stats = useMemo(() => ({
                total: orders.length,
                passed: orders.filter(o => o.qcStatus === 'passed').length,
                pending: orders.filter(o => o.qcStatus === 'pending').length,
                fail: orders.filter(o => o.qcStatus === 'rejected').length
            }), [orders]);

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-20 lg:w-72 glass-dark flex flex-col p-6 z-20">
                        <div className="flex items-center gap-4 mb-12">
                            <div className="w-12 h-12 rounded-2xl ai-shimmer p-[2px]">
                                <div className="w-full h-full bg-slate-900 rounded-[14px] flex items-center justify-center">
                                    <i data-lucide="zap" className="text-white fill-white w-6 h-6"></i>
                                </div>
                            </div>
                            <div className="hidden lg:block">
                                <h1 className="font-black text-xl tracking-tight">WORKSYNC <span className="text-indigo-400">PRO</span></h1>
                                <div className="flex items-center gap-2">
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Enterprise Mode</span>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 space-y-2">
                            {[
                                { id: 'all', label: 'Dashboard', icon: 'grid' },
                                { id: 'pending', label: 'Quality Check', icon: 'shield-alert' },
                                { id: 'passed', label: 'Validated', icon: 'shield-check' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === item.id ? 'bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 shadow-[0_0_20px_rgba(99,102,241,0.2)]' : 'text-slate-400 hover:bg-white/5'}`}>
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    <span className="hidden lg:block font-bold text-sm">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* Main Area */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-6 lg:p-12 relative">
                        {/* Header Stats */}
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                            {[
                                { label: 'Active Jobs', val: stats.total, color: 'text-indigo-400' },
                                { label: 'Passed', val: stats.passed, color: 'text-emerald-400' },
                                { label: 'Pending', val: stats.pending, color: 'text-amber-400' },
                                { label: 'Rejected', val: stats.fail, color: 'text-rose-400' }
                            ].map((s, i) => (
                                <div key={i} className="glass-dark p-6 rounded-[2rem] border-l-4 border-l-indigo-500">
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">{s.label}</span>
                                    <span className={`text-4xl font-black ${s.color}`}>{s.val}</span>
                                </div>
                            ))}
                        </div>

                        <div className="flex justify-between items-end mb-8">
                            <div>
                                <h2 className="text-4xl font-black text-white italic tracking-tighter">OPERATIONS</h2>
                                <p className="text-slate-500 font-medium">จัดการรายการตรวจคุณภาพแบบ Real-time</p>
                            </div>
                            <button onClick={() => setIsAdding(true)} className="px-8 py-4 bg-white text-slate-900 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-indigo-400 hover:text-white transition-all shadow-2xl flex items-center gap-2">
                                <i data-lucide="plus-circle" className="w-5 h-5"></i> New Entry
                            </button>
                        </div>

                        {/* List View */}
                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                            {orders.filter(o => activeTab === 'all' || o.qcStatus === activeTab).map(o => (
                                <div key={o.id} className="glass-dark rounded-[2.5rem] p-6 flex flex-col md:flex-row gap-6 border-transparent hover:border-indigo-500/50 transition-all group">
                                    <div className="w-full md:w-48 h-48 rounded-3xl overflow-hidden bg-slate-800 flex-shrink-0 relative">
                                        {o.images?.[0] ? <img src={o.images[0]} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" /> : <i data-lucide="image" className="absolute center text-slate-700"></i>}
                                        <div className="absolute top-3 left-3 px-3 py-1 bg-black/60 backdrop-blur rounded-lg text-[10px] font-bold font-mono text-indigo-400 uppercase tracking-tighter">{o.id}</div>
                                    </div>

                                    <div className="flex-1 flex flex-col">
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="text-xl font-bold text-white">{o.title}</h3>
                                            <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${o.qcStatus === 'passed' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : o.qcStatus === 'rejected' ? 'bg-rose-500/10 text-rose-400 border border-rose-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}`}>
                                                {o.qcStatus}
                                            </span>
                                        </div>
                                        <div className="bg-white/5 p-4 rounded-2xl mb-4 border border-white/5 flex-1">
                                            <div className="flex items-center gap-2 mb-2">
                                                <i data-lucide="cpu" className="w-3 h-3 text-indigo-400"></i>
                                                <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">AI Audit Log</span>
                                            </div>
                                            <p className="text-xs text-slate-400 leading-relaxed italic line-clamp-3">"{o.aiAnalysis}"</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setQcModal(o)} className="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-bold transition-all border border-white/5">Analyze Detail</button>
                                            <button onClick={() => setOrders(prev => prev.filter(x => x.id !== o.id))} className="w-12 h-12 flex items-center justify-center rounded-xl bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modal: Add (Production Flow) */}
                    {isAdding && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-xl animate-in fade-in duration-300">
                            <div className="glass-dark w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl overflow-hidden relative">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black italic tracking-tighter">DATA ACQUISITION</h2>
                                    <button onClick={() => { setIsAdding(false); if(cameraActive) toggleCamera(); }} className="w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center"><i data-lucide="x"></i></button>
                                </div>

                                <div className="space-y-6">
                                    {cameraActive ? (
                                        <div className="relative rounded-[2rem] overflow-hidden aspect-video bg-black ring-4 ring-indigo-500/20">
                                            <video ref={videoRef} className="w-full h-full object-cover scale-x-[-1]" autoPlay playsInline></video>
                                            <div className="absolute inset-0 border-[40px] border-black/20 pointer-events-none"></div>
                                            <button onClick={capture} className="absolute bottom-6 left-1/2 -translate-x-1/2 w-20 h-20 bg-white rounded-full p-1 shadow-2xl group active:scale-95 transition-transform">
                                                <div className="w-full h-full border-4 border-slate-900 rounded-full flex items-center justify-center text-slate-900">
                                                    <i data-lucide="camera" className="w-8 h-8"></i>
                                                </div>
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="flex gap-4">
                                            <button onClick={toggleCamera} className="flex-1 aspect-square lg:aspect-video bg-indigo-600 rounded-[2rem] flex flex-col items-center justify-center gap-4 hover:bg-indigo-500 transition-all group">
                                                <div className="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center group-hover:scale-110 transition-transform">
                                                    <i data-lucide="camera" className="w-8 h-8"></i>
                                                </div>
                                                <span className="font-black text-xs uppercase tracking-widest">Open Visual Cam</span>
                                            </button>
                                            <label className="flex-1 aspect-square lg:aspect-video bg-white/5 border-2 border-dashed border-white/10 rounded-[2rem] flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-white/10 transition-all">
                                                <i data-lucide="upload-cloud" className="w-8 h-8 text-slate-500"></i>
                                                <span className="font-black text-xs uppercase tracking-widest text-slate-500">Drop Image File</span>
                                                <input type="file" hidden onChange={async e => {
                                                    const reader = new FileReader();
                                                    reader.onload = () => setForm(f => ({...f, tempImages: [reader.result]}));
                                                    reader.readAsDataURL(e.target.files[0]);
                                                }} />
                                            </label>
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <input placeholder="BATCH NUMBER / JOB TITLE" className="w-full bg-white/5 p-6 rounded-2xl outline-none ring-1 ring-white/10 focus:ring-2 focus:ring-indigo-500 transition-all font-bold text-lg" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                                        <textarea placeholder="ADDITIONAL PRODUCTION NOTES..." className="w-full bg-white/5 p-6 rounded-2xl outline-none ring-1 ring-white/10 focus:ring-2 focus:ring-indigo-500 transition-all h-24 text-sm" value={form.detail} onChange={e => setForm({...form, detail: e.target.value})} />
                                    </div>

                                    <button onClick={handleSubmit} disabled={!form.title} className="w-full py-6 ai-shimmer text-white rounded-[2rem] font-black uppercase tracking-[0.2em] text-sm shadow-2xl shadow-indigo-500/20 disabled:opacity-30">Deploy to Pipeline</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal: QC Engine */}
                    {qcModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-2xl">
                            <div className="glass-dark w-full max-w-4xl h-[85vh] rounded-[3.5rem] flex flex-col md:flex-row overflow-hidden border-indigo-500/20 shadow-[0_0_100px_rgba(99,102,241,0.2)]">
                                <div className="w-full md:w-1/2 bg-black relative h-1/2 md:h-full">
                                    <img src={qcModal.images[0]} className="w-full h-full object-contain" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-10">
                                        <h2 className="text-3xl font-black mb-2 uppercase tracking-tighter italic">{qcModal.title}</h2>
                                        <p className="text-slate-400 text-sm font-medium">{new Date(qcModal.timestamp).toLocaleString()}</p>
                                    </div>
                                </div>
                                <div className="flex-1 p-10 overflow-y-auto custom-scrollbar flex flex-col">
                                    <div className="mb-8">
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center text-indigo-400">
                                                <i data-lucide="sparkles" className="w-4 h-4"></i>
                                            </div>
                                            <span className="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-400">AI Intelligent Analysis</span>
                                        </div>
                                        <div className="bg-white/5 p-6 rounded-3xl border border-white/10 leading-relaxed text-slate-300 text-sm italic whitespace-pre-line">
                                            "{qcModal.aiAnalysis}"
                                        </div>
                                    </div>

                                    <div className="space-y-6 mt-auto">
                                        <div>
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 block">Confidence Score</label>
                                            <div className="flex gap-4">
                                                {[1,2,3,4,5].map(s => (
                                                    <button key={s} onClick={() => setQcModal({...qcModal, qcRating: s})} className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${s <= qcModal.qcRating ? 'bg-amber-400 text-slate-900 shadow-lg shadow-amber-400/20' : 'bg-white/5 text-slate-600 hover:bg-white/10'}`}>
                                                        <i data-lucide="star" className={`w-5 h-5 ${s <= qcModal.qcRating ? 'fill-current' : ''}`}></i>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <button onClick={() => { updateQC(qcModal.id, { qcStatus: 'rejected', qcRating: qcModal.qcRating }); setQcModal(null); }} className="py-6 bg-rose-600/10 text-rose-500 rounded-3xl font-black uppercase tracking-widest text-xs border border-rose-600/20 hover:bg-rose-600 hover:text-white transition-all">Flag Incident</button>
                                            <button onClick={() => { updateQC(qcModal.id, { qcStatus: 'passed', qcRating: qcModal.qcRating }); setQcModal(null); }} className="py-6 bg-emerald-600 text-white rounded-3xl font-black uppercase tracking-widest text-xs shadow-xl shadow-emerald-500/20 hover:scale-[1.02] transition-all">Approve Job</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            function updateQC(id, updates) {
                setOrders(prev => prev.map(o => o.id === id ? { ...o, ...updates } : o));
            }
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
