<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync Pro - QC Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .order-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .qc-passed { border-left: 8px solid #22c55e; }
        .qc-rejected { border-left: 8px solid #ef4444; }
        .qc-pending { border-left: 8px solid #e2e8f0; }
        .star-active { color: #f59e0b; fill: #f59e0b; }
        .star-inactive { color: #cbd5e1; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy, getDocs, deleteDoc, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy, getDocs, deleteDoc, writeBatch, updateDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [qcModal, setQcModal] = useState(null);
            const [activePreview, setActivePreview] = useState(null);
            const [form, setForm] = useState({ title: '', detail: '', tempImages: [] });
            
            const canvasRef = useRef(null);
            const dbRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-qc-v1';

            useEffect(() => {
                const init = async () => {
                    if (!window.FB) return;
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FB;
                    const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"AIzaSyDfnz6oOdNuWflcjgr_5cBkrQOCIXcwfHw","authDomain":"myworklog-fd954.firebaseapp.com","projectId":"myworklog-fd954"}');
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    dbRef.current = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                    onAuthStateChanged(auth, u => { if(u) setUser(u); });
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, query, onSnapshot, orderBy, getDocs } = window.FB;
                const ordersRef = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders');
                const q = query(ordersRef, orderBy('timestamp', 'desc'));

                return onSnapshot(q, async (snapshot) => {
                    const orderData = await Promise.all(snapshot.docs.map(async (orderDoc) => {
                        const id = orderDoc.id;
                        const data = orderDoc.data();
                        const imgsSnap = await getDocs(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id, 'images'));
                        const images = imgsSnap.docs.map(d => d.data().src);
                        return { id, ...data, images };
                    }));
                    setOrders(orderData);
                });
            }, [user]);

            const saveQC = async (qcData) => {
                try {
                    const { doc, updateDoc } = window.FB;
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', qcModal.id), {
                        qcStatus: qcData.status,
                        qcRating: qcData.rating,
                        qcNote: qcData.note,
                        status: qcData.status === 'passed' ? 'done' : 'process'
                    });
                    setQcModal(null);
                } catch (e) { alert(e.message); }
            };

            const saveOrder = async () => {
                if (!form.title) return;
                setIsSaving(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.FB;
                    const orderRef = await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders'), {
                        title: form.title,
                        detail: form.detail,
                        timestamp: serverTimestamp(),
                        uid: user.uid,
                        qcStatus: 'pending'
                    });
                    for (const src of form.tempImages) {
                        await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', orderRef.id, 'images'), { src });
                    }
                    setForm({ title: '', detail: '', tempImages: [] });
                    setIsAdding(false);
                } catch (e) { alert(e.message); } finally { setIsSaving(false); }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [orders, isAdding, qcModal]);

            return (
                <div className="min-h-screen">
                    <nav className="sticky top-0 z-40 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white">
                                <i data-lucide="shield-check"></i>
                            </div>
                            <h1 className="font-black text-xl tracking-tight uppercase">WorkSync <span className="text-emerald-600">QC</span></h1>
                        </div>
                        <button onClick={() => setIsAdding(true)} className="bg-slate-900 text-white px-6 py-2.5 rounded-2xl font-bold text-sm">
                            + บันทึกงาน
                        </button>
                    </nav>

                    <main className="p-6 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {orders.map(o => (
                            <div key={o.id} className={`order-card p-6 flex flex-col qc-${o.qcStatus || 'pending'}`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="font-black text-slate-900 leading-tight">{o.title}</h3>
                                        <div className="flex gap-1 mt-1">
                                            {[1, 2, 3, 4, 5].map(star => (
                                                <i key={star} data-lucide="star" className={`w-3 h-3 ${star <= (o.qcRating || 0) ? 'star-active' : 'star-inactive'}`}></i>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => setQcModal(o)} className="p-2 bg-slate-50 hover:bg-emerald-50 text-slate-400 hover:text-emerald-600 rounded-xl transition-colors">
                                        <i data-lucide="check-square" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <p className="text-xs text-slate-500 mb-6 line-clamp-2 h-8">{o.detail || '-'}</p>
                                
                                <div className="grid grid-cols-4 gap-2 mb-6">
                                    {o.images?.slice(0, 4).map((img, i) => (
                                        <div key={i} className="aspect-square rounded-lg overflow-hidden cursor-pointer" onClick={() => setActivePreview(img)}>
                                            <img src={img} className="w-full h-full object-cover" />
                                        </div>
                                    ))}
                                </div>

                                {o.qcNote && (
                                    <div className="bg-slate-50 p-3 rounded-xl mb-4 border border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">QC Feedback:</p>
                                        <p className="text-xs text-slate-600 italic">"{o.qcNote}"</p>
                                    </div>
                                )}

                                <div className="mt-auto flex justify-between items-center pt-4 border-t border-slate-50">
                                    <span className={`text-[10px] font-black uppercase px-2 py-1 rounded-md ${o.qcStatus === 'passed' ? 'bg-emerald-100 text-emerald-700' : o.qcStatus === 'rejected' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-500'}`}>
                                        {o.qcStatus === 'passed' ? 'ผ่านการตรวจสอบ' : o.qcStatus === 'rejected' ? 'ต้องแก้ไข' : 'รอตรวจสอบ'}
                                    </span>
                                    <span className="text-[10px] font-bold text-slate-300">
                                        {o.timestamp ? new Date(o.timestamp.seconds * 1000).toLocaleDateString() : ''}
                                    </span>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* QC Modal */}
                    {qcModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in">
                                <h2 className="text-xl font-black mb-6 flex items-center gap-2">
                                    <i data-lucide="clipboard-check" className="text-emerald-600"></i> ตรวจสอบคุณภาพงาน
                                </h2>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block">ประเมินคุณภาพ (Rating)</label>
                                        <div className="flex gap-3 justify-center bg-slate-50 p-4 rounded-2xl">
                                            {[1, 2, 3, 4, 5].map(star => (
                                                <button key={star} onClick={() => setQcModal({...qcModal, tempRating: star})}>
                                                    <i data-lucide="star" className={`w-8 h-8 ${star <= (qcModal.tempRating || qcModal.qcRating || 0) ? 'star-active' : 'star-inactive'}`}></i>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">หมายเหตุ / จุดที่ต้องแก้ไข</label>
                                        <textarea 
                                            placeholder="ระบุรายละเอียดเพิ่มเติม..."
                                            className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 ring-emerald-100 h-24 text-sm"
                                            value={qcModal.tempNote !== undefined ? qcModal.tempNote : (qcModal.qcNote || '')}
                                            onChange={e => setQcModal({...qcModal, tempNote: e.target.value})}
                                        ></textarea>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <button 
                                            onClick={() => saveQC({ status: 'rejected', rating: qcModal.tempRating || 0, note: qcModal.tempNote || '' })}
                                            className="py-4 bg-red-50 text-red-600 rounded-2xl font-bold border-2 border-red-100"
                                        >
                                            ไม่ผ่าน (Reject)
                                        </button>
                                        <button 
                                            onClick={() => saveQC({ status: 'passed', rating: qcModal.tempRating || 0, note: qcModal.tempNote || '' })}
                                            className="py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-100"
                                        >
                                            ผ่าน (Pass)
                                        </button>
                                    </div>
                                    <button onClick={() => setQcModal(null)} className="w-full text-slate-400 text-xs font-bold uppercase py-2">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Add (Reuse from previous) */}
                    {isAdding && (
                        <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xl rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <h2 className="text-xl font-black mb-6">บันทึกงานใหม่</h2>
                                <div className="space-y-6">
                                    <div className="bg-slate-100 rounded-2xl p-4 text-center border-2 border-dashed border-slate-200">
                                        <label className="cursor-pointer block">
                                            <i data-lucide="plus-circle" className="w-8 h-8 mx-auto text-slate-300 mb-2"></i>
                                            <span className="text-xs font-bold text-slate-400 uppercase">แนบรูปภาพงาน</span>
                                            <input type="file" multiple className="hidden" accept="image/*" onChange={e => {
                                                const files = Array.from(e.target.files);
                                                files.forEach(file => {
                                                    const r = new FileReader();
                                                    r.onload = () => setForm(f => ({...f, tempImages: [...f.tempImages, r.result]}));
                                                    r.readAsDataURL(file);
                                                });
                                            }} />
                                        </label>
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                        {form.tempImages.map((img, i) => (
                                            <img key={i} src={img} className="w-16 h-16 rounded-xl object-cover flex-shrink-0" />
                                        ))}
                                    </div>
                                    <input placeholder="ชื่อออเดอร์" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                                    <button onClick={saveOrder} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold disabled:opacity-20" disabled={!form.title || isSaving}>
                                        {isSaving ? 'กำลังบันทึก...' : 'บันทึกรายการ'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Preview Image */}
                    {activePreview && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-8" onClick={() => setActivePreview(null)}>
                            <img src={activePreview} className="max-w-full max-h-[90vh] object-contain rounded-2xl shadow-2xl" />
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
