<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync AI - Smart Reporting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .app-card { max-width: 500px; margin: 0 auto; min-height: 100vh; background: white; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.02); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .btn-primary { background: #4f46e5; transition: all 0.3s ease; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        video { transform: none; } 
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseBridge = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            signInWithCustomToken, getFirestore, collection, doc, addDoc, 
            onSnapshot, query, serverTimestamp, orderBy 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [reports, setReports] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [isCameraActive, setIsCameraActive] = useState(false);
            const [status, setStatus] = useState('initializing');
            const [form, setForm] = useState({ title: '', detail: '', image: null });
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const dbRef = useRef(null);
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'myworklog-fd954-app';
            const apiKey = "";

            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.FirebaseBridge) {
                        setTimeout(initFirebase, 500);
                        return;
                    }

                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseBridge;

                    try {
                        const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"AIzaSyDfnz6oOdNuWflcjgr_5cBkrQOCIXcwfHw","authDomain":"myworklog-fd954.firebaseapp.com","projectId":"myworklog-fd954","storageBucket":"myworklog-fd954.firebasestorage.app","messagingSenderId":"368228283488","appId":"1:368228283488:web:b5f7129a67315a6aefff05"}');

                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        dbRef.current = getFirestore(app);

                        const performSignIn = async () => {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        };

                        await performSignIn();

                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser) {
                                setUser(currentUser);
                                setStatus('ready');
                            }
                        });
                    } catch (err) {
                        console.error("Firebase Initialization Error:", err);
                        setStatus('error');
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (status !== 'ready' || !user || !dbRef.current) return;

                const { collection, query, onSnapshot, orderBy } = window.FirebaseBridge;
                const reportsRef = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'reports');
                const q = query(reportsRef, orderBy('timestamp', 'desc'));

                const unsubscribe = onSnapshot(q, 
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setReports(data);
                    }, 
                    (err) => {
                        console.error("Firestore Listen Error:", err);
                    }
                );

                return () => unsubscribe();
            }, [status, user]);

            const analyzeImage = async (base64Data) => {
                setIsAnalyzing(true);
                const imageData = base64Data.split(',')[1];
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "วิเคราะห์ภาพถ่ายงานนี้และสรุป 'หัวข้องาน' (สั้นๆ ไม่เกิน 10 คำ) และ 'รายละเอียดงาน' (สรุปสิ่งที่เกิดขึ้นในภาพ) เป็นภาษาไทย โดยส่งกลับมาเป็นรูปแบบ JSON: { \"title\": \"...\", \"detail\": \"...\" }" },
                                    { inlineData: { mimeType: "image/jpeg", data: imageData } }
                                ]
                            }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    const result = await response.json();
                    const analysis = JSON.parse(result.candidates[0].content.parts[0].text);
                    setForm(prev => ({ ...prev, title: analysis.title, detail: analysis.detail }));
                } catch (err) {
                    console.error("AI Analysis Error:", err);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const startCamera = async () => {
                setIsCameraActive(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                        audio: false 
                    });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) {
                    alert("ไม่สามารถเข้าถึงกล้องได้");
                    setIsCameraActive(false);
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
                setIsCameraActive(false);
            };

            const capturePhoto = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                if (video && canvas) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(video, 0, 0);
                    const imageData = canvas.toDataURL('image/jpeg', 1.0);
                    setForm(prev => ({ ...prev, image: imageData }));
                    stopCamera();
                    analyzeImage(imageData);
                }
            };

            const handleImageFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setForm(prev => ({...prev, image: reader.result}));
                        analyzeImage(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const saveReport = async () => {
                if (!form.title || !form.image || !user || isSaving) return;
                setIsSaving(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.FirebaseBridge;
                    await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'reports'), {
                        ...form,
                        creatorId: user.uid,
                        timestamp: serverTimestamp()
                    });
                    setForm({ title: '', detail: '', image: null });
                    setIsAdding(false);
                } catch (err) {
                    alert("บันทึกไม่สำเร็จ");
                } finally {
                    setIsSaving(false);
                }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [status, reports, isAdding, isSaving, isCameraActive, form.image, isAnalyzing]);

            if (status === 'initializing') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-white">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                        <p className="mt-4 font-bold text-slate-400 text-xs tracking-widest uppercase animate-pulse">กำลังตั้งค่าระบบ Cloud...</p>
                    </div>
                );
            }

            return (
                <div className="app-card pb-32">
                    <header className="px-6 py-6 border-b border-slate-50 glass-nav sticky top-0 z-40 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                <i data-lucide="check-square" className="w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-900 leading-none tracking-tighter uppercase">My<span className="text-indigo-600">WorkLog</span></h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Status: Connected</p>
                            </div>
                        </div>
                    </header>

                    <main className="p-6 space-y-8">
                        {reports.map(report => (
                            <div key={report.id} className="animate-pop bg-white border border-slate-100 rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-md transition-all">
                                <div className="relative">
                                    <img src={report.image} className="w-full h-64 object-cover" />
                                    <div className="absolute top-4 right-4 bg-black/40 backdrop-blur-md px-3 py-1 rounded-full text-[10px] text-white font-bold">
                                        {report.timestamp ? new Date(report.timestamp.seconds * 1000).toLocaleTimeString('th-TH') : 'Syncing...'}
                                    </div>
                                </div>
                                <div className="p-7">
                                    <h3 className="text-lg font-black text-slate-900 mb-2">{report.title}</h3>
                                    <p className="text-slate-500 text-sm leading-relaxed mb-4">{report.detail}</p>
                                </div>
                            </div>
                        ))}
                    </main>

                    <div className="fixed bottom-8 left-0 right-0 px-6 flex justify-center z-50 pointer-events-none">
                        <button 
                            onClick={() => setIsAdding(true)}
                            className="pointer-events-auto btn-primary text-white px-10 py-5 rounded-full shadow-2xl flex items-center gap-4 font-black text-xs uppercase tracking-[0.2em]"
                        >
                            <i data-lucide="camera" className="w-5 h-5"></i>
                            Capture Work
                        </button>
                    </div>

                    {isAdding && (
                        <div className="fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl animate-pop max-h-[92vh] overflow-y-auto hide-scrollbar">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black text-slate-900 tracking-tighter uppercase">บันทึกข้อมูล</h2>
                                    <button onClick={() => { setIsAdding(false); stopCamera(); }} className="bg-slate-50 p-2.5 rounded-full text-slate-400">
                                        <i data-lucide="x" className="w-6 h-6"></i>
                                    </button>
                                </div>

                                <div className="space-y-6">
                                    <div className="aspect-video bg-slate-950 rounded-[2rem] border-2 border-slate-200 flex items-center justify-center relative overflow-hidden">
                                        {isCameraActive ? (
                                            <div className="relative w-full h-full">
                                                <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover rounded-[2rem]" />
                                                <button onClick={capturePhoto} className="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl active:scale-90 transition-transform">
                                                    <div className="w-10 h-10 border-4 border-slate-900 rounded-full"></div>
                                                </button>
                                            </div>
                                        ) : form.image ? (
                                            <div className="relative w-full h-full">
                                                <img src={form.image} className="w-full h-full object-cover" />
                                                <button onClick={startCamera} className="absolute top-4 right-4 bg-white/90 backdrop-blur p-2 rounded-full shadow-lg">
                                                    <i data-lucide="refresh-cw" className="w-4 h-4 text-indigo-600"></i>
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col gap-4 items-center">
                                                <button onClick={startCamera} className="flex flex-col items-center gap-2 p-6 rounded-3xl bg-indigo-50 text-indigo-600">
                                                    <i data-lucide="camera" className="w-8 h-8"></i>
                                                    <span className="text-[10px] font-black uppercase tracking-widest">ถ่ายรูป</span>
                                                </button>
                                                <input type="file" accept="image/*" className="hidden" id="fileInput" onChange={handleImageFile} />
                                                <label htmlFor="fileInput" className="cursor-pointer text-[10px] font-bold text-slate-400 uppercase tracking-widest">หรือ เลือกจากอัลบั้ม</label>
                                            </div>
                                        )}
                                    </div>

                                    {isAnalyzing && (
                                        <div className="flex items-center gap-3 bg-indigo-50 p-4 rounded-2xl animate-pulse">
                                            <div className="w-4 h-4 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                            <p className="text-xs font-bold text-indigo-600 uppercase tracking-widest">AI กำลังวิเคราะห์ภาพงาน...</p>
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <input 
                                            placeholder="หัวข้องาน"
                                            className="w-full p-5 bg-slate-50 rounded-2xl font-bold text-slate-900 border-2 border-transparent focus:border-indigo-100 outline-none transition-all"
                                            value={form.title}
                                            onChange={e => setForm({...form, title: e.target.value})}
                                        />
                                        <textarea 
                                            placeholder="สรุปรายละเอียด..."
                                            className="w-full p-5 bg-slate-50 rounded-2xl text-slate-600 min-h-[100px] border-2 border-transparent focus:border-indigo-100 outline-none transition-all"
                                            value={form.detail}
                                            onChange={e => setForm({...form, detail: e.target.value})}
                                        ></textarea>
                                    </div>

                                    <button 
                                        onClick={saveReport}
                                        disabled={!form.title || !form.image || isSaving || isAnalyzing}
                                        className="w-full py-6 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase tracking-widest text-xs shadow-xl disabled:opacity-30 active:scale-95 transition-all"
                                    >
                                        {isSaving ? 'กำลังบันทึก...' : 'บันทึกงาน'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    <canvas ref={canvasRef} className="hidden"></canvas>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
