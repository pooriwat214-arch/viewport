<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync Pro - AI Smart QC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .order-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .qc-passed { border-left: 8px solid #22c55e; }
        .qc-rejected { border-left: 8px solid #ef4444; }
        .qc-pending { border-left: 8px solid #e2e8f0; }
        .star-active { color: #f59e0b; fill: #f59e0b; }
        .star-inactive { color: #cbd5e1; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        .animate-sparkle { animation: sparkle 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy, getDocs, deleteDoc, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, addDoc, onSnapshot, query, serverTimestamp, orderBy, getDocs, deleteDoc, writeBatch, updateDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const apiKey = ""; // API Key provided by the environment
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [qcModal, setQcModal] = useState(null);
            const [activePreview, setActivePreview] = useState(null);
            const [form, setForm] = useState({ title: '', detail: '', tempImages: [], aiAnalysis: '' });
            
            const dbRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'worksync-ai-qc-v1';

            useEffect(() => {
                const init = async () => {
                    if (!window.FB) return;
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FB;
                    const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"apiKey":"AIzaSyDfnz6oOdNuWflcjgr_5cBkrQOCIXcwfHw","authDomain":"myworklog-fd954.firebaseapp.com","projectId":"myworklog-fd954"}');
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    dbRef.current = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                    onAuthStateChanged(auth, u => { if(u) setUser(u); });
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const { collection, query, onSnapshot, orderBy, getDocs } = window.FB;
                const ordersRef = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders');
                const q = query(ordersRef, orderBy('timestamp', 'desc'));

                return onSnapshot(q, async (snapshot) => {
                    const orderData = await Promise.all(snapshot.docs.map(async (orderDoc) => {
                        const id = orderDoc.id;
                        const data = orderDoc.data();
                        const imgsSnap = await getDocs(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', id, 'images'));
                        const images = imgsSnap.docs.map(d => d.data().src);
                        return { id, ...data, images };
                    }));
                    setOrders(orderData);
                });
            }, [user]);

            // Gemini API: Call for AI Text/Image Analysis
            const callGemini = async (prompt, imageData = null, retries = 5) => {
                const url = imageData 
                    ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`
                    : `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

                const contents = imageData 
                    ? [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: imageData.split(',')[1] } }] }]
                    : [{ parts: [{ text: prompt }] }];

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents })
                        });
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "ขออภัย ไม่สามารถวิเคราะห์ได้ในขณะนี้";
                    } catch (error) {
                        if (i === retries - 1) throw error;
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    }
                }
            };

            const analyzeWithAI = async () => {
                if (form.tempImages.length === 0) return;
                setIsAnalyzing(true);
                try {
                    const analysis = await callGemini(
                        "Analyze this image for quality control. Point out details, cleanliness, or any visible defects. Provide a summary in Thai in a professional tone.",
                        form.tempImages[0]
                    );
                    setForm(prev => ({ ...prev, aiAnalysis: analysis }));
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const generateAIFeedback = async () => {
                const rating = qcModal.tempRating || qcModal.qcRating || 0;
                const status = qcModal.status;
                setIsAnalyzing(true);
                try {
                    const prompt = `Write a professional QC feedback in Thai for an order with ${rating}/5 stars. The status is ${status}. Keep it concise and constructive.`;
                    const feedback = await callGemini(prompt);
                    setQcModal(prev => ({ ...prev, tempNote: feedback }));
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const saveQC = async (qcData) => {
                try {
                    const { doc, updateDoc } = window.FB;
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', qcModal.id), {
                        qcStatus: qcData.status,
                        qcRating: qcData.rating,
                        qcNote: qcData.note,
                        status: qcData.status === 'passed' ? 'done' : 'process'
                    });
                    setQcModal(null);
                } catch (e) { alert(e.message); }
            };

            const saveOrder = async () => {
                if (!form.title) return;
                setIsSaving(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.FB;
                    const orderRef = await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders'), {
                        title: form.title,
                        detail: form.detail,
                        aiAnalysis: form.aiAnalysis,
                        timestamp: serverTimestamp(),
                        uid: user.uid,
                        qcStatus: 'pending'
                    });
                    for (const src of form.tempImages) {
                        await addDoc(collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'orders', orderRef.id, 'images'), { src });
                    }
                    setForm({ title: '', detail: '', tempImages: [], aiAnalysis: '' });
                    setIsAdding(false);
                } catch (e) { alert(e.message); } finally { setIsSaving(false); }
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [orders, isAdding, qcModal, isAnalyzing]);

            return (
                <div className="min-h-screen">
                    <nav className="sticky top-0 z-40 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white">
                                <i data-lucide="sparkles" className="animate-sparkle"></i>
                            </div>
                            <h1 className="font-black text-xl tracking-tight uppercase italic">WorkSync <span className="text-indigo-600">Smart QC</span></h1>
                        </div>
                        <button onClick={() => setIsAdding(true)} className="bg-indigo-600 text-white px-6 py-2.5 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-100">
                            + บันทึกงาน
                        </button>
                    </nav>

                    <main className="p-6 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {orders.map(o => (
                            <div key={o.id} className={`order-card p-6 flex flex-col qc-${o.qcStatus || 'pending'}`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="font-black text-slate-900 leading-tight">{o.title}</h3>
                                        <div className="flex gap-1 mt-1">
                                            {[1, 2, 3, 4, 5].map(star => (
                                                <i key={star} data-lucide="star" className={`w-3 h-3 ${star <= (o.qcRating || 0) ? 'star-active' : 'star-inactive'}`}></i>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => setQcModal(o)} className="p-2 bg-slate-50 hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 rounded-xl transition-colors">
                                        <i data-lucide="check-square" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <p className="text-xs text-slate-500 mb-4 line-clamp-2">{o.detail || '-'}</p>
                                
                                <div className="grid grid-cols-4 gap-2 mb-4">
                                    {o.images?.slice(0, 4).map((img, i) => (
                                        <div key={i} className="aspect-square rounded-lg overflow-hidden cursor-pointer" onClick={() => setActivePreview(img)}>
                                            <img src={img} className="w-full h-full object-cover" />
                                        </div>
                                    ))}
                                </div>

                                {o.aiAnalysis && (
                                    <div className="bg-indigo-50/50 p-3 rounded-xl mb-4 border border-indigo-100">
                                        <p className="text-[10px] font-black text-indigo-400 uppercase mb-1 flex items-center gap-1">
                                            <i data-lucide="sparkles" className="w-3 h-3"></i> AI Pre-Analysis
                                        </p>
                                        <p className="text-[11px] text-slate-600 leading-relaxed">{o.aiAnalysis}</p>
                                    </div>
                                )}

                                {o.qcNote && (
                                    <div className="bg-slate-50 p-3 rounded-xl mb-4 border border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Human QC Feedback:</p>
                                        <p className="text-xs text-slate-600 italic">"{o.qcNote}"</p>
                                    </div>
                                )}

                                <div className="mt-auto flex justify-between items-center pt-4 border-t border-slate-50">
                                    <span className={`text-[10px] font-black uppercase px-2 py-1 rounded-md ${o.qcStatus === 'passed' ? 'bg-emerald-100 text-emerald-700' : o.qcStatus === 'rejected' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-500'}`}>
                                        {o.qcStatus === 'passed' ? 'ผ่านการตรวจสอบ' : o.qcStatus === 'rejected' ? 'ต้องแก้ไข' : 'รอตรวจสอบ'}
                                    </span>
                                    <span className="text-[10px] font-bold text-slate-300">
                                        {o.timestamp ? new Date(o.timestamp.seconds * 1000).toLocaleDateString() : ''}
                                    </span>
                                </div>
                            </div>
                        ))}
                    </main>

                    {/* QC Modal */}
                    {qcModal && (
                        <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in">
                                <h2 className="text-xl font-black mb-6 flex items-center gap-2">
                                    <i data-lucide="clipboard-check" className="text-indigo-600"></i> ตรวจสอบคุณภาพงาน
                                </h2>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-3 block">ประเมินคุณภาพ (Rating)</label>
                                        <div className="flex gap-3 justify-center bg-slate-50 p-4 rounded-2xl">
                                            {[1, 2, 3, 4, 5].map(star => (
                                                <button key={star} onClick={() => setQcModal({...qcModal, tempRating: star})}>
                                                    <i data-lucide="star" className={`w-8 h-8 ${star <= (qcModal.tempRating || qcModal.qcRating || 0) ? 'star-active' : 'star-inactive'}`}></i>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase">หมายเหตุ / Feedback</label>
                                            <button 
                                                onClick={generateAIFeedback}
                                                disabled={isAnalyzing}
                                                className="text-[10px] font-bold text-indigo-600 flex items-center gap-1 hover:underline disabled:opacity-50"
                                            >
                                                {isAnalyzing ? '...' : <><i data-lucide="sparkles" className="w-3 h-3"></i> ✨ AI ร่างข้อความ</>}
                                            </button>
                                        </div>
                                        <textarea 
                                            placeholder="ระบุรายละเอียดเพิ่มเติม..."
                                            className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 ring-indigo-100 h-24 text-sm"
                                            value={qcModal.tempNote !== undefined ? qcModal.tempNote : (qcModal.qcNote || '')}
                                            onChange={e => setQcModal({...qcModal, tempNote: e.target.value})}
                                        ></textarea>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <button 
                                            onClick={() => saveQC({ status: 'rejected', rating: qcModal.tempRating || 0, note: qcModal.tempNote || '' })}
                                            className="py-4 bg-red-50 text-red-600 rounded-2xl font-bold border-2 border-red-100"
                                        >
                                            ไม่ผ่าน
                                        </button>
                                        <button 
                                            onClick={() => saveQC({ status: 'passed', rating: qcModal.tempRating || 0, note: qcModal.tempNote || '' })}
                                            className="py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100"
                                        >
                                            ผ่าน (Pass)
                                        </button>
                                    </div>
                                    <button onClick={() => setQcModal(null)} className="w-full text-slate-400 text-xs font-bold uppercase py-2">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Add with AI Analysis */}
                    {isAdding && (
                        <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xl rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh] scrollbar-hide">
                                <h2 className="text-xl font-black mb-6">บันทึกงานใหม่</h2>
                                <div className="space-y-6">
                                    <div className="bg-slate-100 rounded-2xl p-4 text-center border-2 border-dashed border-slate-200">
                                        <label className="cursor-pointer block">
                                            <i data-lucide="plus-circle" className="w-8 h-8 mx-auto text-slate-300 mb-2"></i>
                                            <span className="text-xs font-bold text-slate-400 uppercase">แนบรูปภาพเพื่อวิเคราะห์</span>
                                            <input type="file" multiple className="hidden" accept="image/*" onChange={e => {
                                                const files = Array.from(e.target.files);
                                                files.forEach(file => {
                                                    const r = new FileReader();
                                                    r.onload = () => setForm(f => ({...f, tempImages: [...f.tempImages, r.result]}));
                                                    r.readAsDataURL(file);
                                                });
                                            }} />
                                        </label>
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                        {form.tempImages.map((img, i) => (
                                            <img key={i} src={img} className="w-20 h-20 rounded-xl object-cover flex-shrink-0 border border-slate-200 shadow-sm" />
                                        ))}
                                    </div>

                                    {form.tempImages.length > 0 && !form.aiAnalysis && (
                                        <button 
                                            onClick={analyzeWithAI}
                                            disabled={isAnalyzing}
                                            className="w-full py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold text-xs flex items-center justify-center gap-2 border border-indigo-100"
                                        >
                                            {isAnalyzing ? 'กำลังวิเคราะห์...' : <><i data-lucide="sparkles" className="w-4 h-4 animate-sparkle"></i> ✨ วิเคราะห์งานด้วย AI</>}
                                        </button>
                                    )}

                                    {form.aiAnalysis && (
                                        <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 animate-in">
                                            <p className="text-[10px] font-black text-indigo-400 uppercase mb-2">ผลการวิเคราะห์ AI:</p>
                                            <p className="text-xs text-slate-600 leading-relaxed italic">"{form.aiAnalysis}"</p>
                                        </div>
                                    )}

                                    <input placeholder="ชื่อออเดอร์" className="w-full p-4 bg-slate-50 rounded-2xl outline-none border-none font-bold" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                                    <textarea placeholder="รายละเอียดเพิ่มเติม" className="w-full p-4 bg-slate-50 rounded-2xl outline-none border-none h-20 text-sm" value={form.detail} onChange={e => setForm({...form, detail: e.target.value})}></textarea>
                                    
                                    <button onClick={saveOrder} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black disabled:opacity-20 shadow-xl shadow-indigo-100" disabled={!form.title || isSaving}>
                                        {isSaving ? 'กำลังบันทึก...' : 'บันทึกและส่งงาน'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Preview Image */}
                    {activePreview && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-8 animate-in" onClick={() => setActivePreview(null)}>
                            <img src={activePreview} className="max-w-full max-h-[90vh] object-contain rounded-2xl shadow-2xl" />
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
