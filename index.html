<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkLog AI - Field Reporting</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #fcfcfd;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .entry-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .entry-card:active {
            transform: scale(0.98);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const apiKey = ""; // API Key สำหรับ Gemini AI

        // ระบบ AI วิเคราะห์ภาพ
        const callGemini = async (prompt, systemInstruction = "", imageBase64 = null) => {
            try {
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] }
                };
                if (imageBase64) {
                    payload.contents[0].parts.push({
                        inlineData: { mimeType: "image/png", data: imageBase64.split(',')[1] }
                    });
                }
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "ไม่สามารถวิเคราะห์ได้";
            } catch (err) {
                console.error("AI Error:", err);
                return "เกิดข้อผิดพลาดในการเรียก AI";
            }
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.fb = { auth, db, collection, addDoc, onSnapshot, query, serverTimestamp, doc, orderBy, appId, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
        window.gemini = { callGemini };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [history, setHistory] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [loading, setLoading] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);
            const [form, setForm] = useState({ title: '', detail: '', image: null });
            const [status, setStatus] = useState('connecting'); // connecting, ready, error

            const initAuth = async () => {
                if (!window.fb) return;
                const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.fb;
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    onAuthStateChanged(auth, (u) => {
                        if (u) {
                            setUser(u);
                            setStatus('ready');
                        }
                    });
                } catch (err) {
                    console.error("Auth Error:", err);
                    setStatus('error');
                }
            };

            useEffect(() => {
                const timer = setTimeout(() => {
                    if (!window.fb) return;
                    initAuth();
                }, 1000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, query, onSnapshot, orderBy, appId } = window.fb;
                
                // Fetching: /artifacts/{appId}/public/data/work_reports
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'work_reports'), orderBy('timestamp', 'desc'));
                
                const unsubscribe = onSnapshot(q, 
                    (snapshot) => {
                        setHistory(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    }, 
                    (err) => {
                        console.error("Firestore Listen Error:", err);
                        if (err.code === 'permission-denied') setStatus('error');
                    }
                );
                return () => unsubscribe();
            }, [user]);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setForm({...form, image: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            const askAI = async () => {
                if (!form.image) return;
                setAiLoading(true);
                const summary = await window.gemini.callGemini(
                    "สรุปสั้นๆ สำหรับรายงานการทำงาน", 
                    "คุณคือวิศวกรผู้เชี่ยวชาญ สรุปหัวข้อสั้นๆ ไม่เกิน 5 คำในบรรทัดแรก และรายละเอียดเน้นสิ่งที่เห็นในภาพอีก 2 ประโยค", 
                    form.image
                );
                const lines = summary.split('\n').filter(l => l.trim());
                setForm(f => ({
                    ...f,
                    title: lines[0] || f.title,
                    detail: lines.slice(1).join(' ') || f.detail
                }));
                setAiLoading(false);
            };

            const submit = async () => {
                if (!form.image || !form.title) return;
                setLoading(true);
                const { db, collection, addDoc, serverTimestamp, appId } = window.fb;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'work_reports'), {
                        ...form,
                        userId: user.uid,
                        timestamp: serverTimestamp()
                    });
                    setForm({ title: '', detail: '', image: null });
                    setShowModal(false);
                } catch (err) {
                    alert("บันทึกไม่สำเร็จ: " + err.message);
                }
                setLoading(false);
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [status, history, showModal, aiLoading]);

            if (status === 'connecting') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-white p-8">
                        <div className="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin mb-6"></div>
                        <h2 className="font-black text-slate-900 uppercase tracking-widest text-sm">Initialising AI System</h2>
                        <p className="text-slate-400 text-xs mt-2">หากค้างนานเกินไป โปรดรีเฟรชหน้าพรีวิวครับ</p>
                    </div>
                );
            }

            if (status === 'error') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-red-50 p-10 text-center">
                        <i data-lucide="shield-off" className="w-16 h-16 text-red-400 mb-6"></i>
                        <h2 className="font-black text-red-900 uppercase">สิทธิ์การเข้าถึงถูกปฏิเสธ</h2>
                        <p className="text-red-700 text-sm mt-3 leading-relaxed">กรุณาตรวจสอบหน้า <b>Rules</b> ใน Firebase ให้แน่ใจว่ากด <b>Publish</b> หลังจากแก้เป็น `allow read, write: if true;` แล้ว</p>
                        <button onClick={() => window.location.reload()} className="mt-8 px-8 py-4 bg-red-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl shadow-red-200">ลองใหม่อีกครั้ง</button>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-40 max-w-xl mx-auto bg-white shadow-2xl relative border-x border-slate-50">
                    <header className="glass-header sticky top-0 z-40 px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                                <i data-lucide="zap" className="w-5 h-5 fill-current"></i>
                            </div>
                            <h1 className="text-xl font-black text-slate-900 tracking-tighter uppercase italic">Work<span className="text-indigo-600">Sync</span></h1>
                        </div>
                        <div className="flex flex-col items-end">
                            <div className="flex items-center gap-1.5 bg-green-50 px-2 py-0.5 rounded-full border border-green-100">
                                <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                <span className="text-[9px] font-black text-green-600 uppercase">Live</span>
                            </div>
                        </div>
                    </header>

                    <main className="p-6 space-y-8">
                        {history.length === 0 ? (
                            <div className="py-24 text-center">
                                <div className="w-24 h-24 bg-slate-50 rounded-[2.5rem] flex items-center justify-center mx-auto mb-6">
                                    <i data-lucide="layers" className="w-10 h-10 text-slate-200"></i>
                                </div>
                                <h3 className="text-slate-900 font-black text-sm uppercase tracking-widest">No Activity Records</h3>
                                <p className="text-slate-400 text-xs mt-2">ถ่ายรูปและให้ AI ช่วยเขียนรายงานได้ทันที</p>
                            </div>
                        ) : (
                            history.map((item, idx) => (
                                <div key={item.id} className="animate-fade-in group" style={{ animationDelay: `${idx * 0.1}s` }}>
                                    <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden hover:shadow-2xl transition-all duration-500">
                                        <div className="relative h-72">
                                            <img src={item.image} className="w-full h-full object-cover" />
                                            <div className="absolute top-6 left-6 px-4 py-2 bg-white/90 backdrop-blur-md rounded-2xl text-[10px] font-black shadow-sm">
                                                {item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) : 'NOW'}
                                            </div>
                                        </div>
                                        <div className="p-8">
                                            <h3 className="font-black text-xl text-slate-900 group-hover:text-indigo-600 transition-colors">{item.title}</h3>
                                            <p className="text-slate-500 text-sm mt-3 leading-relaxed font-medium">{item.detail}</p>
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </main>

                    <div className="fixed bottom-10 left-0 right-0 px-6 flex justify-center z-50 pointer-events-none">
                        <button 
                            onClick={() => setShowModal(true)} 
                            className="pointer-events-auto bg-slate-900 text-white px-10 py-6 rounded-[2.5rem] shadow-2xl flex items-center gap-4 active:scale-95 transition-all hover:bg-indigo-600 group"
                        >
                            <i data-lucide="camera" className="w-6 h-6 group-hover:rotate-12 transition-transform"></i>
                            <span className="font-black text-sm uppercase tracking-[0.2em]">New Report</span>
                        </button>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-white w-full max-w-lg rounded-t-[3.5rem] sm:rounded-[3.5rem] p-10 shadow-2xl animate-fade-in max-h-[95vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black text-slate-900 tracking-tighter uppercase">Field Capture</h2>
                                    <button onClick={() => setShowModal(false)} className="p-3 bg-slate-100 rounded-2xl hover:bg-red-50 hover:text-red-500 transition-colors">
                                        <i data-lucide="x" className="w-6 h-6"></i>
                                    </button>
                                </div>

                                <div className="space-y-6">
                                    <div className="h-64 bg-slate-50 rounded-[3rem] border-4 border-dashed border-slate-100 relative overflow-hidden flex items-center justify-center hover:border-indigo-200 transition-all">
                                        {form.image ? (
                                            <>
                                                <img src={form.image} className="w-full h-full object-cover" />
                                                <button 
                                                    onClick={askAI} 
                                                    disabled={aiLoading} 
                                                    className="absolute bottom-6 bg-white/95 px-6 py-3 rounded-2xl font-black text-[10px] shadow-2xl flex items-center gap-2 hover:bg-indigo-600 hover:text-white transition-all border border-indigo-50"
                                                >
                                                    {aiLoading ? <i data-lucide="loader-2" className="animate-spin w-4 h-4"></i> : <i data-lucide="sparkles" className="w-4 h-4 text-indigo-500"></i>}
                                                    {aiLoading ? "ANALYZING..." : "GENERATE SUMMARY"}
                                                </button>
                                            </>
                                        ) : (
                                            <label className="w-full h-full flex flex-col items-center justify-center cursor-pointer group">
                                                <div className="w-20 h-20 bg-white rounded-3xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                                                    <i data-lucide="camera" className="w-10 h-10 text-slate-300"></i>
                                                </div>
                                                <span className="text-[10px] font-black text-slate-400 mt-6 uppercase tracking-[0.3em]">Tap to Upload</span>
                                                <input type="file" accept="image/*" className="hidden" onChange={handleFile} />
                                            </label>
                                        )}
                                    </div>

                                    <div className="space-y-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-4">Title</label>
                                            <input 
                                                type="text" 
                                                placeholder="ระบุหัวข้อรายงาน..." 
                                                className="w-full p-6 bg-slate-50 rounded-[2rem] outline-none font-black text-slate-800 border-2 border-transparent focus:border-indigo-100 focus:bg-white transition-all" 
                                                value={form.title} 
                                                onChange={e => setForm({...form, title: e.target.value})} 
                                            />
                                        </div>

                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-4">AI Description</label>
                                            <textarea 
                                                placeholder="รายละเอียดที่วิเคราะห์..." 
                                                className="w-full p-6 bg-slate-50 rounded-[2.5rem] outline-none min-h-[140px] border-2 border-transparent focus:border-indigo-100 focus:bg-white transition-all leading-relaxed font-medium text-slate-600" 
                                                value={form.detail} 
                                                onChange={e => setForm({...form, detail: e.target.value})} 
                                            />
                                        </div>
                                    </div>

                                    <button 
                                        onClick={submit} 
                                        disabled={loading || !form.title || !form.image} 
                                        className="w-full py-7 bg-slate-900 text-white rounded-[2.5rem] font-black uppercase tracking-[0.4em] text-xs shadow-2xl hover:bg-indigo-600 disabled:opacity-20 transition-all active:scale-95"
                                    >
                                        {loading ? "SAVING TO CLOUD..." : "SAVE REPORT"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
