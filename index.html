<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WorkSync AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{font-family:system-ui;background:#f1f5f9}
.app{max-width:520px;margin:auto;background:white;min-height:100vh}
</style>
</head>

<body>

<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

window.FB={
initializeApp,getAuth,signInAnonymously,
getFirestore,collection,addDoc,serverTimestamp,
onSnapshot,query,orderBy,
getStorage,ref,uploadBytes,getDownloadURL
}
</script>

<script type="text/babel">

const {useState,useEffect,useRef}=React

/* ---------------- Dashboard ---------------- */

function Dashboard({reports}){

const today=new Date()

const todayReports=reports.filter(r=>{
 if(!r.timestamp?.seconds) return false
 const d=new Date(r.timestamp.seconds*1000)
 return d.toDateString()===today.toDateString()
})

const totalToday=todayReports.length

const byHour={}

todayReports.forEach(r=>{
 const d=new Date(r.timestamp.seconds*1000)
 const h=d.getHours()
 byHour[h]=(byHour[h]||0)+1
})

const hours=Object.keys(byHour).sort((a,b)=>a-b)

return(

<div className="space-y-4">

<div className="grid grid-cols-2 gap-3">

<div className="bg-indigo-50 p-4 rounded-xl">
<div className="text-xs text-indigo-500">รายงานวันนี้</div>
<div className="text-2xl font-bold">{totalToday}</div>
</div>

<div className="bg-green-50 p-4 rounded-xl">
<div className="text-xs text-green-500">ช่วงเวลาที่มีงาน</div>
<div className="text-2xl font-bold">{hours.length}</div>
</div>

</div>

<div className="bg-white border rounded-xl p-3">

<div className="font-semibold mb-2">
รายงานตามชั่วโมง
</div>

{hours.length===0 &&
<div className="text-sm text-gray-400">
ยังไม่มีรายงานวันนี้
</div>
}

{hours.map(h=>(
<div key={h} className="flex justify-between border-b py-1 text-sm">
<span>{h}:00</span>
<span>{byHour[h]} งาน</span>
</div>
))}

</div>

</div>

)

}

/* ---------------- Camera ---------------- */

function Camera({onCapture,onClose}){

const videoRef=useRef(null)
const canvasRef=useRef(null)
const streamRef=useRef(null)

useEffect(()=>{

async function start(){

try{

const stream=await navigator.mediaDevices.getUserMedia({
 video:{facingMode:"environment"}
})

streamRef.current=stream
videoRef.current.srcObject=stream

}catch(e){

alert("ไม่สามารถเปิดกล้องได้")

}

}

start()

return ()=>{

if(streamRef.current){
streamRef.current.getTracks().forEach(t=>t.stop())
}

}

},[])

function shoot(){

const video=videoRef.current
const canvas=canvasRef.current

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

const time=new Date().toLocaleString("th-TH")

ctx.fillStyle="white"
ctx.font="28px sans-serif"
ctx.fillText(time,20,canvas.height-30)

/* compress image */

canvas.toBlob(blob=>{
onCapture(blob)
},"image/jpeg",0.7)

}

return(

<div className="fixed inset-0 bg-black z-50 flex flex-col">

<video
ref={videoRef}
autoPlay
playsInline
className="flex-1 object-cover"
/>

<div className="p-6 flex justify-center gap-6">

<button
onClick={shoot}
className="w-16 h-16 bg-white rounded-full"
/>

<button
onClick={onClose}
className="text-white"
>
ปิด
</button>

</div>

<canvas ref={canvasRef} className="hidden"/>

</div>

)

}

/* ---------------- App ---------------- */

function App(){

const [reports,setReports]=useState([])
const [title,setTitle]=useState("")
const [detail,setDetail]=useState("")
const [camera,setCamera]=useState(false)

const [imageBlob,setImageBlob]=useState(null)
const [preview,setPreview]=useState(null)

const [loading,setLoading]=useState(false)

const db=useRef(null)
const storage=useRef(null)

/* firebase init */

useEffect(()=>{

async function init(){

if(typeof __firebase_config==='undefined') return

const config=JSON.parse(__firebase_config)

const app=FB.initializeApp(config)

const auth=FB.getAuth(app)
await FB.signInAnonymously(auth)

storage.current=FB.getStorage(app)

db.current=FB.getFirestore(app)

const q=FB.query(
FB.collection(db.current,'reports'),
FB.orderBy('timestamp','desc')
)

FB.onSnapshot(q,snap=>{

const data=snap.docs.map(d=>({
id:d.id,
...d.data()
}))

setReports(data)

})

}

init()

},[])

/* capture image */

function handleCapture(blob){

setCamera(false)

setImageBlob(blob)

setPreview(URL.createObjectURL(blob))

}

/* submit report */

async function submit(){

if(!title||!imageBlob) return

if(loading) return

setLoading(true)

try{

const imgRef=FB.ref(storage.current,'reports/'+Date.now()+'.jpg')

await FB.uploadBytes(imgRef,imageBlob)

const url=await FB.getDownloadURL(imgRef)

await FB.addDoc(
FB.collection(db.current,'reports'),
{
title,
detail,
image:url,
timestamp:FB.serverTimestamp()
}
)

setTitle("")
setDetail("")
setPreview(null)
setImageBlob(null)

}catch(e){

alert("บันทึกไม่สำเร็จ")

}

setLoading(false)

}

/* UI */

return(

<div className="app p-6 space-y-6">

<h1 className="text-2xl font-black">
WorkSync AI
</h1>

<Dashboard reports={reports}/>

<div className="bg-slate-50 p-4 rounded-2xl space-y-3">

<input
className="w-full p-3 rounded-xl"
placeholder="หัวข้อรายงาน"
value={title}
onChange={e=>setTitle(e.target.value)}
/>

<textarea
className="w-full p-3 rounded-xl"
placeholder="รายละเอียด"
value={detail}
onChange={e=>setDetail(e.target.value)}
/>

<button
onClick={()=>setCamera(true)}
className="w-full bg-gray-900 text-white p-3 rounded-xl"
>
เปิดกล้อง
</button>

{preview &&
<img src={preview} className="rounded-xl"/>
}

<button
onClick={submit}
className="w-full bg-indigo-600 text-white p-3 rounded-xl"
>
{loading ? "กำลังบันทึก..." : "บันทึกรายงาน"}
</button>

</div>

<div className="space-y-4">

{reports.map(r=>(

<div key={r.id} className="border rounded-2xl overflow-hidden">

<img src={r.image}/>

<div className="p-3">

<div className="font-bold">
{r.title}
</div>

<div className="text-sm text-gray-500">
{r.detail}
</div>

<div className="text-xs text-gray-400">

{r.timestamp?.seconds
? new Date(r.timestamp.seconds*1000).toLocaleString("th-TH")
: ""}

</div>

</div>

</div>

))}

</div>

{camera &&
<Camera
onCapture={handleCapture}
onClose={()=>setCamera(false)}
/>
}

</div>

)

}

const root=ReactDOM.createRoot(document.getElementById("root"))
root.render(<App/>)

</script>

</body>
</html>
