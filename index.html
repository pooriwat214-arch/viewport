<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkLog AI - Smart Field Monitoring</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const apiKey = ""; // สำหรับ Gemini API

        const callGemini = async (prompt, systemInstruction = "", imageBase64 = null) => {
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            if (imageBase64) {
                payload.contents[0].parts.push({
                    inlineData: { mimeType: "image/png", data: imageBase64.split(',')[1] }
                });
            }
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            return result.candidates?.[0]?.content?.parts?.[0]?.text || "AI ไม่สามารถวิเคราะห์ได้";
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.fb = { auth, db, collection, addDoc, onSnapshot, query, serverTimestamp, doc, orderBy, appId, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
        window.gemini = { callGemini };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [history, setHistory] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [loading, setLoading] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);
            const [form, setForm] = useState({ title: '', detail: '', image: null });
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.fb) {
                        clearInterval(checkFB);
                        initAuth();
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            const initAuth = async () => {
                const { auth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } = window.fb;
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    console.error("Auth failed:", err);
                }
                onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsReady(true);
                });
            };

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, query, onSnapshot, orderBy, appId } = window.fb;
                // RULE 1: ใช้ Path ตามโครงสร้างที่กำหนด
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'work_reports'), orderBy('timestamp', 'desc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    setHistory(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Firestore Error:", err));
                return () => unsubscribe();
            }, [user]);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setForm({...form, image: reader.result});
                    reader.readAsDataURL(file);
                }
            };

            const runAI = async () => {
                if (!form.image) return;
                setAiLoading(true);
                try {
                    const res = await window.gemini.callGemini(
                        "วิเคราะห์รูปนี้", 
                        "คุณคือวิศวกรไทย สรุปหัวข้อสั้นๆ 5 คำ และรายละเอียด 2 ประโยค", 
                        form.image
                    );
                    const [title, ...detail] = res.split('\n').filter(p => p.trim());
                    setForm(f => ({ ...f, title: title || f.title, detail: detail.join(' ') || f.detail }));
                } catch (e) { console.error(e); }
                setAiLoading(false);
            };

            const saveLog = async () => {
                if (!user || !form.title || !form.image) return;
                setLoading(true);
                const { db, collection, addDoc, serverTimestamp, appId } = window.fb;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'work_reports'), {
                        ...form,
                        timestamp: serverTimestamp(),
                        userId: user.uid
                    });
                    setForm({ title: '', detail: '', image: null });
                    setShowModal(false);
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [history, isReady, showModal, aiLoading]);

            if (!isReady) return <div className="h-screen flex items-center justify-center font-bold text-indigo-600 animate-pulse">กำลังเชื่อมต่อ...</div>;

            return (
                <div className="min-h-screen pb-20 max-w-2xl mx-auto bg-white shadow-2xl">
                    <header className="p-6 bg-white border-b sticky top-0 z-10 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
                                <i data-lucide="camera"></i>
                            </div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tighter uppercase">WorkLog AI</h1>
                        </div>
                        <div className="text-[10px] font-black px-3 py-1 bg-slate-100 rounded-full text-slate-500 uppercase tracking-widest">
                            {user?.uid.slice(0, 8)}
                        </div>
                    </header>

                    <main className="p-6 space-y-6">
                        {history.map(item => (
                            <div key={item.id} className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <img src={item.image} className="w-full h-56 object-cover" />
                                <div className="p-6">
                                    <h3 className="font-bold text-lg text-slate-800">{item.title}</h3>
                                    <p className="text-slate-500 text-sm mt-1 leading-relaxed">{item.detail}</p>
                                </div>
                            </div>
                        ))}
                    </main>

                    <button onClick={() => setShowModal(true)} className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-8 py-5 rounded-full shadow-2xl shadow-indigo-200 flex items-center gap-3 active:scale-95 transition-all z-20">
                        <i data-lucide="plus"></i>
                        <span className="font-black text-sm uppercase tracking-widest">เพิ่มบันทึก</span>
                    </button>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-lg rounded-t-[3rem] sm:rounded-[3rem] p-8 modal-animate max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black uppercase">Capture Log</h2>
                                    <button onClick={() => setShowModal(false)} className="bg-slate-100 p-2 rounded-xl"><i data-lucide="x"></i></button>
                                </div>
                                <div className="space-y-4">
                                    <div className="h-56 bg-slate-50 rounded-[2.5rem] border-2 border-dashed border-slate-200 relative overflow-hidden flex items-center justify-center">
                                        {form.image ? (
                                            <>
                                                <img src={form.image} className="w-full h-full object-cover" />
                                                <button onClick={runAI} disabled={aiLoading} className="absolute bottom-4 bg-white px-4 py-2 rounded-xl font-bold text-xs shadow-xl flex items-center gap-2">
                                                    {aiLoading ? <i data-lucide="loader-2" className="animate-spin w-3 h-3"></i> : <i data-lucide="sparkles" className="w-3 h-3 text-indigo-600"></i>}
                                                    AI ช่วยสรุปรูปนี้
                                                </button>
                                            </>
                                        ) : (
                                            <label className="text-center cursor-pointer">
                                                <i data-lucide="image" className="w-10 h-10 mx-auto text-slate-300"></i>
                                                <span className="text-[10px] font-bold text-slate-400 block mt-2 uppercase">เลือกรูปภาพ</span>
                                                <input type="file" accept="image/*" className="hidden" onChange={handleFile} />
                                            </label>
                                        )}
                                    </div>
                                    <input type="text" placeholder="หัวข้องาน" className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                                    <textarea placeholder="รายละเอียด..." className="w-full p-5 bg-slate-50 rounded-2xl outline-none min-h-[100px]" value={form.detail} onChange={e => setForm({...form, detail: e.target.value})} />
                                    <button onClick={saveLog} disabled={loading || !form.title || !form.image} className="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black uppercase tracking-widest shadow-xl disabled:opacity-20 transition-opacity">
                                        {loading ? "กำลังบันทึก..." : "ยืนยันบันทึกข้อมูล"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
